<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Resumen Pre-Pedido – Azaleia</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <script src="https://cdn.jsdelivr.net/npm/exceljs@4.3.0/dist/exceljs.min.js"></script>

  <style>
    :root{
      --az:#e66b00;
      --az-dark:#c85b00;
      --az-soft:#f6f1ec;
      --az-soft-2:#f2ece7;
      --card:#ffffff;
      --line:#e7ddd4;
      --text:#49372a;
      --muted:#7b6b5d;
      --shadow:0 8px 22px rgba(0,0,0,.08);
      --radius-xl:26px;
      --radius-lg:18px;
      --radius-md:12px;
    }

    *{box-sizing:border-box}
    body{
      font-family:'Segoe UI',sans-serif;
      background:var(--az-soft);
      color:var(--text);
      margin:0;
          background:#f8f9fa ;
          overflow-x:hidden;
            font-size: 13px;
    }
  
    html, body{height:100%;}
  :root { --zoom: 0.70; --az:#e66b00; --az-dark:#cc5200; --az-soft:#fff7f2;  }
#app-scale{
  transform:none;
  transform-origin: 0 0;
  width:100%;
  min-height:100vh;
}  
    .page-wrap{
      padding:20px 20px 28px;
    }

    .page-title{
      color:var(--az-dark);
      font-size:1.6rem;
      font-weight:700;
      margin:0 0 14px;
    }

    .summary-card{
      background:#fff;
      border-radius:18px;
      box-shadow:var(--shadow);
      border:1px solid #eee1d7;
      padding:18px 20px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:20px;
      margin-bottom:14px;
    }

    .summary-left{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }

    .summary-icon{
      width:34px;
      height:34px;
      border-radius:10px;
      display:grid;
      place-items:center;
      background:var(--az);
      color:#fff;
      font-size:1.1rem;
      flex:0 0 auto;
    }

    .summary-label{
      font-size:.97rem;
      color:var(--muted);
      margin:0;
    }

    .summary-value{
      font-size:1.6rem;
      font-weight:800;
      color:#1f1f1f;
      line-height:1;
      margin:0;
      white-space:nowrap;
    }

    .filter-shell{
      background:var(--az-soft-2);
      border:5px solid #d7d0ca;
      border-radius:40px;
      padding:16px 14px 14px;
      margin-bottom:18px;
    }

    .filter-grid{
      display:grid;
      grid-template-columns: repeat(6, minmax(150px, 1fr));
      gap:14px;
      align-items:end;
    }

    .filter-item label{
      display:block;
      font-size:.88rem;
      margin-bottom:4px;
      color:#5f4d40;
      font-weight:500;
    }

    .form-control,
    .form-select{
      border-radius:10px;
      border:1px solid #cfc3b6;
    min-height:32px;
  font-size:.82rem;
      box-shadow:none !important;
    }

    .form-control:focus,
    .form-select:focus{
      border-color:var(--az);
    }

    .actions-row{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:12px;
      align-items:center;
    }

    .btn-az{
      background:var(--az);
      color:#fff;
      border:none;
      border-radius:10px;
      min-height:32px;
  padding:6px 14px;
  font-size:.82rem;
      font-weight:600;
    }

    .btn-az:hover{
      background:var(--az-dark);
      color:#fff;
    }

    .btn-soft{
      background:#fff;
      border:1px solid #d8c8bb;
      color:#6b5443;
      border-radius:10px;
     min-height:32px;
  padding:6px 14px;
  font-size:.82rem;
      font-weight:600;
    }

    .btn-soft:hover{
      background:#faf7f4;
    }

    .result-card{
      background:#fff;
      border-radius:20px;
      overflow:hidden;
      border:1px solid #eaded4;
      box-shadow:var(--shadow);
    }

    .result-head{
      background:var(--az);
      color:#fff;
      padding:10px 14px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      font-weight:700;
      font-size:.94rem;
    }

    .result-count{
      font-weight:700;
      font-size:.88rem;
      opacity:.95;
    }

    .table-wrap{
      max-height:420px;
      overflow:auto;
      background:#fff;
    }

    .tabla-az{
      width:100%;
      border-collapse:separate;
      border-spacing:0;
     font-size:.75rem;
      margin:0;
    }

    .tabla-az thead th{
      position:sticky;
      top:0;
      z-index:3;
      background:var(--az);
      color:#fff;
      border-right:1px solid #d35b00;
      border-bottom:1px solid #d35b00;
      padding:8px 10px;
      white-space:nowrap;
      font-weight:700;
    }

    .tabla-az thead th:first-child{
      border-left:1px solid #d35b00;
    }

    .tabla-az tbody td{
        padding:5px 8px;
      border-right:1px solid #ececec;
      border-bottom:1px solid #ececec;
      white-space:nowrap;
      background:#fff;
    }

    .tabla-az tbody tr:nth-child(even) td{
      background:#fafafa;
    }

    .tabla-az tbody tr:hover td{
      background:#fff4eb;
    }

    .totals-row td{
      background:#fff0e1 !important;
      font-weight:700;
      border-top:2px solid #f0b37c;
    }

    .grouped-first{
      border-top:2px solid #d7c8bb !important;
    }

    .filter-bar{
      position:static;
      background:transparent;
      padding:0;
    }

    .ms-wrap{
      position:relative;
      min-width:100%;
    }

    .ms-input{
      display:flex;
      align-items:center;
      gap:6px;
      flex-wrap:wrap;
      min-height:40px;
      padding:6px 34px 6px 10px;
      border:1px solid #cfc3b6;
      border-radius:10px;
      background:#fff;
      cursor:pointer;
    }

    .ms-placeholder{
      color:#8b7d70;
      font-size:.92rem;
    }

    .ms-chip{
      background:#ffe6d6;
      color:#7a2f00;
      border:1px solid #ffcfb3;
      border-radius:999px;
      padding:2px 8px;
      font-size:.78rem;
      display:inline-flex;
      align-items:center;
      gap:6px;
    }

    .ms-chip button{
      border:none;
      background:transparent;
      color:#7a2f00;
      padding:0;
      line-height:1;
      cursor:pointer;
    }

    .ms-caret{
      position:absolute;
      right:10px;
      top:50%;
      transform:translateY(-50%);
      color:#666;
    }

    .ms-panel{
      position:absolute;
      left:0;
      right:0;
      top:calc(100% + 6px);
      background:#fff;
      border:1px solid #ddd;
      border-radius:12px;
      box-shadow:0 10px 25px rgba(0,0,0,.12);
      z-index:50;
      display:none;
    }

    .ms-panel.open{ display:block; }

    .ms-search{
      padding:8px;
      border-bottom:1px solid #eee;
    }

    .ms-search input{
      width:100%;
      border-radius:8px;
      border:1px solid #ddd;
      padding:6px 10px;
    }

    .ms-list{
      max-height:240px;
      overflow:auto;
      padding:6px 8px;
    }

    .ms-item{
      display:flex;
      align-items:center;
      gap:8px;
      padding:6px 6px;
      border-radius:8px;
    }

    .ms-item:hover{
      background:#f7f7f7;
    }

    .ms-actions{
      display:flex;
      justify-content:flex-end;
      gap:10px;
      padding:10px;
      border-top:1px solid #eee;
    }

    .drag-item{
      display:flex;
      align-items:center;
      gap:10px;
      padding:8px 10px;
      border:1px solid #eee;
      border-radius:8px;
      background:#fff;
      margin-bottom:8px;
    }

    .drag-handle{cursor:grab;color:#666}
    .drag-item.dragging{opacity:.6;border-style:dashed}
    .small-muted{font-size:.85rem;color:#6c757d}
    .cm-actions{display:flex;gap:8px;flex-wrap:wrap}

    .pagination-bar{
      display:flex;
      flex-wrap:wrap;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:12px 14px;
      border-top:1px solid #eaded4;
      background:#fff;
    }

    .pagination-left,
    .pagination-center,
    .pagination-right{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
    }

    .page-pill{
      background:#fff5ed;
      color:#8a4d1c;
      border:1px solid #f2c39c;
      border-radius:999px;
      padding:4px 10px;
      font-size:.85rem;
      font-weight:600;
    }

    .loader-overlay{
      position: fixed;
      inset: 0;
      z-index: 3000;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,.72);
      backdrop-filter: blur(1px);
      transition: opacity .2s ease;
    }

    .loader-overlay.d-none{
      display: none !important;
    }

    .az-spinner{
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 4px solid transparent;
      border-top: 4px solid #d96504;
      border-right: 4px solid #d96504;
      animation: azSpin .75s linear infinite;
    }

    @keyframes azSpin{
      from{ transform: rotate(0deg); }
      to{ transform: rotate(360deg); }
    }

    @media (max-width: 1200px){
      .filter-grid{
        grid-template-columns: repeat(3, minmax(170px, 1fr));
      }
    }

    @media (max-width: 768px){
      .page-wrap{
        padding:14px;
      }

      .page-title{
        font-size:1.6rem;
      }

      .summary-card{
        padding:14px;
      }

      .summary-value{
        font-size:1.6rem;
      }

      .filter-shell{
        border-radius:24px;
        padding:14px;
      }

      .filter-grid{
        grid-template-columns: 1fr;
      }

      .result-head{
        flex-direction:column;
        align-items:flex-start;
      }

      .pagination-bar{
        flex-direction:column;
        align-items:flex-start;
      }
    }
    .filter-head-row th{
  position: sticky;
  top: 37px; /* ajusta si el alto de tu header cambia */
  z-index: 2;
  background: #f7efe8;
  border-right: 1px solid #e2d3c7;
  border-bottom: 1px solid #decdbf;
  padding: 6px 8px;
}

.col-filter{
  width: 100%;
  min-width: 70px;
  height: 30px;
  border: 1px solid #d8c8bb;
  border-radius: 8px;
  padding: 4px 8px;
  font-size: .78rem;
  outline: none;
  background: #fff;
  color: #5c4635;
}

.col-filter:focus{
  border-color: var(--az);
}

.col-filter::placeholder{
  color: #9a8a7d;
}

.filter-head-row .filter-empty{
  background: #f7efe8;
}
.th-wrap{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
}

.th-label{
  overflow:hidden;
  text-overflow:ellipsis;
}

.th-filter-btn{
  border:none;
  background:transparent;
  color:#fff;
  padding:0;
  font-size:.85rem;
  cursor:pointer;
  opacity:.95;
}

.th-filter-btn:hover{
  opacity:1;
}

.filter-popup{
  position: fixed;
  width: 320px;
  max-width: calc(100vw - 16px);
  height: 360px;
  background:#fff;
  border:1px solid #d9cbbb;
  border-radius:12px;
  box-shadow:0 14px 34px rgba(0,0,0,.16);
  z-index:5000;
  display:none;
  overflow:hidden;
}

.filter-popup.open{
  display:block;
    flex-direction:column;
}

.filter-popup-head{
    padding:10px 12px;
  border-bottom:1px solid #eee2d8;
  background:#fff8f2;
  font-weight:700;
  color:#7a4c27;
  flex:0 0 auto;
}
.filter-popup-search{
  padding:8px 10px;
  border-bottom:1px solid #eee;
  flex:0 0 auto;
}

.filter-popup-search input{
  width:100%;
  border:1px solid #d9cbbb;
  border-radius:8px;
  padding:6px 10px;
  font-size:.84rem;
}

.filter-popup-actions-top{
 display:flex;
  justify-content:space-between;
  gap:8px;
  padding:8px 10px;
  border-bottom:1px solid #eee;
  flex:0 0 auto;
}

.filter-popup-actions-top button{
   border:1px solid #d9cbbb;
  background:#fff;
  color:#6c4d37;
  border-radius:8px;
  padding:4px 8px;
  font-size:.78rem;
  cursor:pointer;
}

.filter-popup-list{
 flex:1 1 auto;
  overflow:auto;
  padding:8px 10px;
  min-height:0;
}

.filter-popup-item{
   display:flex;
  align-items:center;
  gap:8px;
  padding:5px 2px;
  font-size:.82rem;
  color:#4f3e31;
}

.filter-popup-item input{
  margin:0;
}

.filter-popup-footer{
   display:flex;
  justify-content:space-between;
  align-items:center;
  gap:8px;
  padding:10px;
  border-top:1px solid #eee;
  background:#fff;
  flex:0 0 auto;
}
.filter-popup-footer .fp-info{
  font-size:.78rem;
  color:#7a6a5c;
}

.filter-popup-footer button{
  min-width:80px;
}
.totals-wrap{
  overflow-x:auto;
  overflow-y:hidden;
  background:#fff;
  border-top:1px solid #eaded4;
}

.tabla-totales{
  width:100%;
  border-collapse:separate;
  border-spacing:0;
  font-size:.83rem;
  margin:0;
}

.tabla-totales td{
    padding:5px 8px;
  border-right:1px solid #ececec;
  border-bottom:1px solid #ececec;
  white-space:nowrap;
  background:#fff0e1 !important;
  font-weight:700;
  border-top:2px solid #f0b37c;
}

  </style>
</head>

<body>
  <div class="page-wrap">
    <h1 class="page-title">Resumen de Pre-Pedidos</h1>

    <section class="summary-card">
      <div class="summary-left">
        <div class="summary-icon">
          <i class="bi bi-box-seam"></i>
        </div>
        <div>
          <p class="summary-label mb-0">Total pares (global)</p>
        </div>
      </div>
      <p id="totalParesGlobal" class="summary-value">0</p>
    </section>

    <section class="filter-shell">
      <div class="filter-bar">
        <div class="filter-grid">
          <div class="filter-item">
            <label for="fIni">Desde</label>
            <input type="date" id="fIni" class="form-control">
          </div>

          <div class="filter-item">
            <label for="fFin">Hasta</label>
            <input type="date" id="fFin" class="form-control">
          </div>

          <div class="filter-item">
            <label>Vendedor (multi)</label>
            <div id="msVendedor"></div>
          </div>

          <div class="filter-item">
            <label>Colección (multi)</label>
            <div id="msColeccion"></div>
          </div>

          <div class="filter-item">
            <label>Fabricante (multi)</label>
            <div id="msFabricante"></div>
          </div>

          <div class="filter-item">
            <label>Marca (multi)</label>
            <div id="msMarca"></div>
          </div>
        </div>

        <div class="actions-row">
          <button id="btnBuscar" class="btn btn-az">
            <i class="bi bi-search me-1"></i>Buscar
          </button>

          <button id="btnColumnas" class="btn btn-soft">
            <i class="bi bi-layout-three-columns me-1"></i>Columnas
          </button>

          <button id="btnExcel" class="btn btn-az">
            <i class="bi bi-file-earmark-excel me-1"></i>Excel
          </button>

          <div class="form-check ms-2">
            <input class="form-check-input" type="checkbox" id="chkGroup">
            <label class="form-check-label" for="chkGroup">Agrupar</label>
          </div>
        </div>
      </div>
    </section>

    <section class="result-card">
      <div class="result-head">
        <span>Resultado</span>
        <span id="resultCount" class="result-count">0 filas</span>
      </div>

      <div class="table-wrap" id="tableWrap">
        <table class="tabla-az" id="mainTable">
          <thead>
            <tr id="theadRow"></tr>
            <tr id="theadFilterRow" class="filter-head-row"></tr>
          </thead>
          <tbody id="tbodyResumen"></tbody>
        </table>
      </div>

      <div class="totals-wrap" id="totalsWrap">
        <table class="tabla-az tabla-totales" id="totalsTable">
          <tbody id="tbodyTotales"></tbody>
        </table>
      </div>

      <div class="pagination-bar">
        <div class="pagination-left">
          <label for="pageSize" class="small text-muted mb-0">Filas por página</label>
          <select id="pageSize" class="form-select form-select-sm" style="width:auto;">
            <option value="50">50</option>
            <option value="100" selected>100</option>
            <option value="200">200</option>
            <option value="500">500</option>
            <option value="1000">1000</option>
          </select>
        </div>

        <div class="pagination-center">
          <span id="pageInfo" class="page-pill">Página 1 de 1</span>
          <span id="rowsInfo" class="small text-muted">0 filas</span>
        </div>

        <div class="pagination-right">
          <button id="btnFirstPage" class="btn btn-soft btn-sm">
            <i class="bi bi-chevron-double-left"></i>
          </button>
          <button id="btnPrevPage" class="btn btn-soft btn-sm">
            <i class="bi bi-chevron-left"></i> Anterior
          </button>
          <button id="btnNextPage" class="btn btn-soft btn-sm">
            Siguiente <i class="bi bi-chevron-right"></i>
          </button>
          <button id="btnLastPage" class="btn btn-soft btn-sm">
            <i class="bi bi-chevron-double-right"></i>
          </button>
        </div>
      </div>
    </section>
  </div>

  <div class="modal fade" id="columnModal" tabindex="-1" aria-labelledby="columnModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="columnModalLabel">
            <i class="bi bi-columns-gap me-2"></i>Configurar columnas
          </h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>
        <div class="modal-body">
          <p class="small-muted">Arrastra para reordenar. Marca o desmarca para mostrar u ocultar.</p>
          <div id="columnList"></div>
        </div>
        <div class="modal-footer cm-actions">
          <button id="cmShowAll" type="button" class="btn btn-outline-success btn-sm">Mostrar todas</button>
          <button id="cmHideAll" type="button" class="btn btn-outline-secondary btn-sm">Ocultar todas</button>
          <button id="cmReset" type="button" class="btn btn-outline-warning btn-sm">Restablecer</button>
          <div class="flex-grow-1"></div>
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button id="cmApply" type="button" class="btn btn-az" data-bs-dismiss="modal">Aplicar</button>
        </div>
      </div>
    </div>
  </div>

  <div id="pageLoader" class="loader-overlay d-none" aria-live="polite" aria-busy="true">
    <div class="az-spinner"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    let filteredData = [];
    let currentPage = 1;
    let pageSize = 100;
    let loaderCount = 0;
    let renderToken = 0;
    let columnFilters = {};
let filterTypingTimer = null;
let columnValueFilters = {};
let activeFilterColumnId = null;

let baseData = [];

    function escapeHtml(str){
      return String(str ?? '').replace(/[&<>"']/g, (m) => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'
      }[m]));
    }

    function createMultiSelect(mountId, {
      placeholder = 'Seleccionar...',
      items = [],
      initialSelected = [],
      onApply = () => {}
    } = {}){
      const mount = document.getElementById(mountId);
      if (!mount) return null;

      const state = {
        items: [...items],
        selected: new Set(initialSelected),
        pending: new Set(initialSelected),
        open: false,
        query: ''
      };

      const itemLabelByValue = () => {
        const map = new Map();
        state.items.forEach(it => map.set(it.value, it.label ?? it.value));
        return map;
      };

      mount.classList.add('ms-wrap');
      mount.innerHTML = `
        <div class="ms-input" tabindex="0" role="button" aria-label="multiselect">
          <span class="ms-placeholder">${escapeHtml(placeholder)}</span>
          <span class="ms-caret bi bi-chevron-down"></span>
        </div>
        <div class="ms-panel">
          <div class="ms-search">
            <input type="text" class="form-control form-control-sm" placeholder="Buscar...">
          </div>
          <div class="ms-list"></div>
          <div class="ms-actions">
            <button type="button" class="btn btn-outline-secondary btn-sm ms-cancel">Cancelar</button>
            <button type="button" class="btn btn-az btn-sm ms-ok">OK</button>
          </div>
        </div>
      `;

      const inputEl = mount.querySelector('.ms-input');
      const panelEl = mount.querySelector('.ms-panel');
      const searchEl = mount.querySelector('.ms-search input');
      const listEl = mount.querySelector('.ms-list');
      const btnCancel = mount.querySelector('.ms-cancel');
      const btnOk = mount.querySelector('.ms-ok');

      function renderChips(){
        inputEl.querySelectorAll('.ms-chip').forEach(x => x.remove());
        const ph = inputEl.querySelector('.ms-placeholder');
        const arr = [...state.selected];
        const labels = itemLabelByValue();

    function buildRowSpanMatrix(rows, vcols){
      const n = rows.length, m = vcols.length;
      const span = Array.from({length:n}, ()=>Array(m).fill(1));

      for (let j=0; j<m; j++){
        let start = 0;
        for (let i=1; i<=n; i++){
          const prevVal = canonicalValue(rows[i-1], vcols[j]);
          const currVal = (i<n) ? canonicalValue(rows[i], vcols[j]) : Symbol('end');
          if (prevVal !== currVal){
            const rs = i - start;
            span[start][j] = rs;
            for (let k=start+1; k<i; k++) span[k][j] = 0;
            start = i;
          }
        }
      }
      return span;

function getDistinctColumnValues(col){

  baseData.forEach(row => {

    else if (col.type === 'int') displayValue = String(int0(rawValue));
    else displayValue = text(rawValue).trim();

    const normalized = normalizeFilterValue(displayValue || '(Vacío)');
    const label = displayValue || '(Vacío)';

    if (!values.has(normalized)) {
      values.set(normalized, label);
    }
  });

  return [...values.entries()]
    .map(([norm, label]) => ({ norm, label }))
    .sort((a,b) => a.label.localeCompare(b.label, 'es', { sensitivity:'base' }));
}

function applyColumnValueFilters(){
  const vcols = getVisibleCols();

  filteredData = baseData.filter(row => {
    for (const col of vcols){
      const selectedValues = columnValueFilters[col.id];
      if (!selectedValues || !selectedValues.length) continue;

      const rawValue = firstFieldValue(row, col.field);

      let displayValue = '';
      if (col.type === 'money') displayValue = money(rawValue);
      else if (col.type === 'int') displayValue = String(int0(rawValue));
      else displayValue = text(rawValue).trim();

      const normalized = normalizeFilterValue(displayValue || '(Vacío)');

      if (!selectedValues.includes(normalized)) {
        return false;
      }
    }
    return true;
  });

  lastData = filteredData;
  updateSummary(filteredData);
  renderCurrentPage();
}

function clearInvisibleColumnValueFilters(){
  const visibleIds = new Set(getVisibleCols().map(c => c.id));
  Object.keys(columnValueFilters).forEach(k => {
    if (!visibleIds.has(k)) delete columnValueFilters[k];
  });
}

    async function cargarDatos(){
      const fIniInput = document.getElementById('fIni');
      const fFinInput = document.getElementById('fFin');
      const tbody = document.getElementById('tbodyResumen');
      const area = localStorage.getItem('area') || '';

      showLoader();
      tbody.innerHTML = '<tr><td class="text-center py-3" colspan="999">Cargando...</td></tr>';

      try {
        if (fIniInput.value > fFinInput.value) {
          tbody.innerHTML = '<tr><td colspan="999" class="text-danger text-center py-3">La fecha inicio debe ser anterior a la fecha fin</td></tr>';
          document.getElementById('totalParesGlobal').textContent = '0';
          document.getElementById('resultCount').textContent = '0 filas';
          filteredData = [];
          updatePaginationInfo();
          return;
        }

        areaVendedor = area;
        const fechaInicio = formatearFechaParaAPI(fIniInput.value);
        const fechaFin = formatearFechaParaAPI(fFinInput.value);

        const payload = { fechaInicio, fechaFin, areaVendedor };

        if (selectedMarca.length) payload.Marca = selectedMarca.join('-');
        if (selectedFabricante.length) payload.Fabricante = selectedFabricante.join('-');
        if (selectedColeccion.length) payload.Coleccion = selectedColeccion.join('-');
        if (selectedVendedor.length) payload.CodVendedor = selectedVendedor.join('-');

        lastPayload = payload;

        const data = await fetchResumen(payload);
        const rows = mapPrePedidoData(Array.isArray(data) ? data : []);

        const colecciones = uniqSorted(rows.map(getCol));
        const fabricantes = uniqSorted(rows.map(getFab));
        const marcas = uniqSorted(rows.map(getMar));
        const vendedores = uniqSorted(rows.map(getVen));

        msColeccion?.setItems(colecciones.map(x => ({ value:x, label:x })));
        msFabricante?.setItems(fabricantes.map(x => ({ value:x, label:x })));
        msMarca?.setItems(marcas.map(x => ({ value:x, label:x })));
        msVendedor?.setItems(vendedores.map(x => ({ value:x, label:x })));

        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY)||'null');
        COLS = rebuildColsForData(saved, DEFAULT_COLS, rows);

        const setEq = (selectedArr, value) => {
          if (!selectedArr.length) return true;
          const v = normKey(value);
          return selectedArr.some(x => normKey(x) === v);
        };
        baseData = rows.filter(r => {
          const ven = getVen(r);
          const mar = getMar(r);
          const fab = getFab(r);
          const col = getCol(r);

          const okVen = setEq(selectedVendedor, ven);
          const okMarca = setEq(selectedMarca, mar);
          const okFab = setEq(selectedFabricante, fab);
          const okCol = setEq(selectedColeccion, col);

          return okVen && okMarca && okFab && okCol;
        });

        currentPage = 1;
        applyColumnValueFilters();

  
      } catch(e){
        console.error(e);
        tbody.innerHTML = '<tr><td colspan="999" class="text-danger text-center py-3">Error al cargar datos</td></tr>';
        document.getElementById('totalParesGlobal').textContent = '0';
        document.getElementById('resultCount').textContent = '0 filas';
        filteredData = [];
        updatePaginationInfo();
      } finally {
        hideLoader();
      }
    }

    function renderCurrentPage(){
      updatePaginationInfo();
      const pageRows = getPagedData(filteredData);
      renderTable(pageRows);
    }

    function calcTotals(rows, vcols){
      const out = { totalPares: 0, totalCajas: 0, tallas: {} };
      const tallaKeys = vcols.filter(c => String(c.id).startsWith('talla_')).map(c => c.id.split('_')[1]);

      rows.forEach(r => {
        let pares = Number(r.totalPares) || 0;
        if (!pares && r.tallas && typeof r.tallas === 'object') {
          pares = Object.values(r.tallas).reduce((s, n) => s + (parseInt(n,10)||0), 0);
        }
        out.totalPares += pares;
        out.totalCajas += (parseInt(r.totalCajas,10) || 0);

        tallaKeys.forEach(tk => {
          out.tallas[tk] = (out.tallas[tk] || 0) + (parseInt(r?.tallas?.[tk],10) || 0);
        });
      });

      return out;
    }

 function renderTotalsExternal(rows, vcols){
  const tbodyTotales = document.getElementById('tbodyTotales');
  if (!tbodyTotales) return;

  tbodyTotales.innerHTML = '';

  if (!rows.length) return;

  const totals = calcTotals(rows, vcols);

  const tr = document.createElement('tr');

  vcols.forEach((c, index) => {

    const td = document.createElement('td');

    const alignClass =
      (c.align === 'end' ? 'text-end' :
      (c.align === 'center' ? 'text-center' : ''));

    if (alignClass) td.className = alignClass;

    let value = '';

    if (index === 0){
      value = 'Totales';
    }
    else if (c.id === 'totalCajas'){
      value = totals.totalCajas;
    }
    else if (c.id === 'totalPares'){
      value = totals.totalPares;
    }
    else if (String(c.id).startsWith('talla_')){
      const talla = c.id.split('_')[1];
      value = totals.tallas[talla] || 0;
    }

    td.textContent = value;

    tr.appendChild(td);
  });

  tbodyTotales.appendChild(tr);
}

function syncTotalsWidths(){
  const mainTable = document.getElementById('mainTable');
  const totalsTable = document.getElementById('totalsTable');
  const theadRow = document.getElementById('theadRow');

  if (!mainTable || !totalsTable || !theadRow) return;

  const headerCells = [...theadRow.children];
  if (!headerCells.length) return;

  const colgroup = document.createElement('colgroup');

  headerCells.forEach(th => {
    const col = document.createElement('col');
    col.style.width = `${th.getBoundingClientRect().width}px`;
    colgroup.appendChild(col);
  });

  totalsTable.querySelectorAll('colgroup').forEach(x => x.remove());
  totalsTable.insertBefore(colgroup, totalsTable.firstChild);
}



function openColumnManager(){
      const list = document.getElementById('columnList');
      list.innerHTML = '';

      COLS.forEach(col=>{
        const item = document.createElement('div');
        item.className = 'drag-item';
        item.draggable = true;
        item.dataset.id = col.id;
        item.innerHTML = `
          <span class="drag-handle bi bi-grip-vertical"></span>
          <div class="form-check">
            <input class="form-check-input cm-check" type="checkbox" id="cm_${col.id}" ${col.visible ? 'checked':''}>
            <label class="form-check-label" for="cm_${col.id}">${col.label}</label>
          </div>
          <span class="ms-auto small text-muted">${col.type === 'money' ? 'moneda' : col.type === 'int' ? 'entero' : (col.type === 'image' ? 'imagen' : 'texto')}</span>
        `;
        list.appendChild(item);
      });

      let dragged = null;
      list.querySelectorAll('.drag-item').forEach(el=>{
        el.addEventListener('dragstart', e=>{
          dragged = el;
          el.classList.add('dragging');
          e.dataTransfer.effectAllowed = 'move';
        });
        el.addEventListener('dragend', ()=>{
          dragged?.classList.remove('dragging');
          dragged = null;
        });
      });

      list.addEventListener('dragover', e=>{
        e.preventDefault();
        const afterElement = getDragAfterElement(list, e.clientY);
        if(afterElement == null) list.appendChild(dragged);
        else list.insertBefore(dragged, afterElement);
      });

      function getDragAfterElement(container, y){
        const els = [...container.querySelectorAll('.drag-item:not(.dragging)')];
        return els.reduce((closest, child)=>{
          const box = child.getBoundingClientRect();
          const offset = y - box.top - box.height/2;
          if(offset < 0 && offset > closest.offset) return {offset, element: child};
          else return closest;
        }, {offset: Number.NEGATIVE_INFINITY}).element;
      }

      document.getElementById('cmShowAll').onclick = ()=>{ list.querySelectorAll('.cm-check').forEach(c=>c.checked=true); };
      document.getElementById('cmHideAll').onclick = ()=>{ list.querySelectorAll('.cm-check').forEach(c=>c.checked=false); };
      document.getElementById('cmReset').onclick = ()=>{
        COLS = JSON.parse(JSON.stringify(DEFAULT_COLS));
        openColumnManager();
      };

      document.getElementById('cmApply').onclick = ()=>{
        const items = [...list.querySelectorAll('.drag-item')];
        const nextCols = items.map(it=>{
          const id = it.dataset.id;
          const base = COLS.find(c=>c.id===id) || DEFAULT_COLS.find(c=>c.id===id);
          return {...base, visible: it.querySelector('.cm-check').checked};
        });
     COLS = nextCols;
      saveCols(COLS);
      clearInvalidColumnFilters();
      currentPage = 1;
      applyColumnValueFilters();
      setTimeout(syncTotalsWidths, 0);
            };

      new bootstrap.Modal(document.getElementById('columnModal')).show();
    }

});
  clearInvalidColumnFilters();

     if(!Array.isArray(data) || data.length === 0){
  tbody.innerHTML = '<tr><td colspan="999" class="text-center py-3">Sin datos</td></tr>';
  const tbodyTotales = document.getElementById('tbodyTotales');
  if (tbodyTotales) tbodyTotales.innerHTML = '';
  return;
}

      let rows = data;
      let rowSpanMatrix = null;

      if (GROUP.enabled){
        rows = sortForGrouping(rows, vcols);
        rowSpanMatrix = buildRowSpanMatrix(rows, vcols);
      }

      tableWrap.scrollTop = 0;

      const chunkSize = 120;
      let index = 0;

      function appendChunk(){
        if (myToken !== renderToken) return;

        const frag = document.createDocumentFragment();
        const limit = Math.min(index + chunkSize, rows.length);

        for (let i=index; i<limit; i++){
          const r = rows[i];
          const tr = document.createElement('tr');

          for (let j=0; j<vcols.length; j++){
            const c = vcols[j];
            const alignClass = (c.align === 'end' ? 'text-end' : (c.align === 'center' ? 'text-center' : ''));

            if (c.type === 'image'){
              let rs = 1;
              if (GROUP.enabled){
                const cellSpan = rowSpanMatrix[i][j];
                if (cellSpan === 0) continue;
                rs = cellSpan;
              }

              const td = document.createElement('td');
              td.className = alignClass;
              if (GROUP.enabled && rs > 1){
                td.rowSpan = rs;
                td.classList.add('grouped-first');
              }

              const urlImg = firstFieldValue(r, c.field);
              if (urlImg){
                const img = document.createElement('img');
                img.src = urlImg;
                img.alt = '';
                img.style.maxHeight = '40px';
                img.referrerPolicy = 'no-referrer';
                td.appendChild(img);
              }
              tr.appendChild(td);
              continue;
            }

            if (GROUP.enabled){
              const rs = rowSpanMatrix[i][j];
              if (rs === 0) continue;
              const td = document.createElement('td');
              td.textContent = formattedValue(r, c);
              if (rs > 1){
                td.rowSpan = rs;
                td.classList.add('grouped-first');
              }
              td.className = alignClass;
              tr.appendChild(td);
            }else{
              const td = document.createElement('td');
              td.textContent = formattedValue(r, c);
              td.className = alignClass;
              tr.appendChild(td);
            }
          }

          frag.appendChild(tr);
        }

        tbody.appendChild(frag);
        index = limit;

        if (index < rows.length){
          requestAnimationFrame(appendChunk);
        } else {
          renderTotalsExternal( rows, vcols);
           requestAnimationFrame(()=>{
            syncTotalsWidths();
          });
        }
      }

      requestAnimationFrame(appendChunk);
    }

    async function exportarExcel() {
      showLoader();
      try {
        if (!lastPayload) {
          alert("Primero realiza una búsqueda.");
          return;
        }

        if (!window.ExcelJS) {
          throw new Error("ExcelJS no está cargado. Revisa el CDN.");
        }

        const rows = Array.isArray(lastData) ? [...lastData] : [];
        const vcols = COLS.filter(c=>c.visible);

        if (vcols.length === 0) {
          alert("No hay columnas visibles para exportar.");
          return;
        }

        let outRows = rows;
        let rowSpanMatrix = null;
        if (GROUP.enabled){
          outRows = sortForGrouping(outRows, vcols);
          rowSpanMatrix = buildRowSpanMatrix(outRows, vcols);
        }

        const workbook = new ExcelJS.Workbook();
        const worksheet = workbook.addWorksheet("Resumen Pre-Pedidos");

        worksheet.addRow(vcols.map(c=>c.label));
        const headerRow = worksheet.getRow(1);

        headerRow.eachCell((cell) => {
          cell.font = { bold: true, color: { argb: "FFFFFFFF" } };
          cell.fill = { type: "pattern", pattern: "solid", fgColor: { argb: "FFD46321" } };
          cell.alignment = { horizontal: "center", vertical: "middle" };
          cell.border = {
            top:{style:"thin"},
            left:{style:"thin"},
            bottom:{style:"thin"},
            right:{style:"thin"}
          };
        });

        for (let i=0; i<outRows.length; i++){
          const r = outRows[i];
          const values = vcols.map((c, j)=>{
            if (GROUP.enabled && rowSpanMatrix[i][j] === 0) return '';
            if (c.type === 'money'){
              const raw = firstFieldValue(r, c.field);
              const n = parseFloat(String(raw ?? '').replace(',','.'));
              return Number.isFinite(n) ? n : 0;
            } else if (c.type === 'int'){
              return int0(firstFieldValue(r, c.field));
            } else if (c.type === 'image'){
              return text(firstFieldValue(r, c.field));
            } else {
              return text(firstFieldValue(r, c.field));
            }
          });

          const row = worksheet.addRow(values);
          row.eachCell((cell, idx)=>{
            const type = vcols[idx-1]?.type;
            cell.alignment = {
              vertical:'middle',
              horizontal: (vcols[idx-1]?.align==='end'?'right':vcols[idx-1]?.align==='center'?'center':'left')
            };
            cell.border = {
              top:{style:"thin"},
              left:{style:"thin"},
              bottom:{style:"thin"},
              right:{style:"thin"}
            };
            if (type==='money') cell.numFmt = '#,##0.00';
          });
        }

        worksheet.columns.forEach((col) => {
          let max = 10;
          col.eachCell({includeEmpty:true}, cell => {
            const len = String(cell.value ?? '').length;
            if (len > max) max = len;
          });
          col.width = Math.min(max + 2, 45);
        });

        worksheet.autoFilter = {
          from: { row: 1, column: 1 },
          to: { row: 1, column: vcols.length }
        };

        const buffer = await workbook.xlsx.writeBuffer();
        const blob = new Blob([buffer], {
          type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"
        });

        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "ResumenPrePedidos.xlsx";
        link.click();
      } catch (error) {
        console.error("Error al exportar Excel:", error);
        alert("Ocurrió un error al generar el archivo Excel: " + (error?.message || error));
      } finally {
        hideLoader();
      }
    }

    function showLoader(){
      const loader = document.getElementById('pageLoader');
      if (!loader) return;

      loaderCount++;
      loader.classList.remove('d-none');
    }

    function hideLoader(){
      const loader = document.getElementById('pageLoader');
      if (!loader) return;

      loaderCount = Math.max(0, loaderCount - 1);
      if (loaderCount === 0){
        loader.classList.add('d-none');
      }
    }
    function normalizeFilterValue(v){
  return String(v ?? '')
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .trim()
    .toUpperCase();
}

function renderColumnFilters(vcols){
  const filterRow = document.getElementById('theadFilterRow');
  if (!filterRow) return;

  filterRow.innerHTML = '';

  vcols.forEach(col => {
    const th = document.createElement('th');

    if (col.type === 'image'){
      th.className = 'filter-empty';
      filterRow.appendChild(th);
      return;
    }

    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'col-filter';
    input.placeholder = 'Filtrar...';
    input.value = columnFilters[col.id] ?? '';

    input.addEventListener('input', (e) => {
      columnFilters[col.id] = e.target.value || '';

      clearTimeout(filterTypingTimer);
      filterTypingTimer = setTimeout(() => {
        currentPage = 1;
        applyColumnFilters();
      }, 180);
    });

    th.appendChild(input);
    filterRow.appendChild(th);
  });
}

function applyColumnFilters(){
  const vcols = getVisibleCols();

  filteredData = baseData.filter(row => {
    for (const col of vcols){
      if (col.type === 'image') continue;

      const filterValue = normalizeFilterValue(columnFilters[col.id] || '');
      if (!filterValue) continue;

      const rawValue = firstFieldValue(row, col.field);

      let cellValue = '';
      if (col.type === 'money') cellValue = money(rawValue);
      else if (col.type === 'int') cellValue = String(int0(rawValue));
      else cellValue = text(rawValue);

      const normalizedCell = normalizeFilterValue(cellValue);

      if (!normalizedCell.includes(filterValue)) {
        return false;
      }
    }
    return true;
  });

  lastData = filteredData;
  updateSummary(filteredData);
  renderCurrentPage();
}
function clearInvalidColumnFilters(){
  const visibleIds = new Set(getVisibleCols().map(c => c.id));
  Object.keys(columnFilters).forEach(key => {
    if (!visibleIds.has(key)) delete columnFilters[key];
  });
}
document.addEventListener('click', (e) => {
  const popup = document.getElementById('columnFilterPopup');
  if (!popup.classList.contains('open')) return;

  const clickedInsidePopup = popup.contains(e.target);
  const clickedFilterButton = e.target.closest('.th-filter-btn');

  if (!clickedInsidePopup && !clickedFilterButton){
    closeColumnFilterPopup();
  }
});
