<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Gestión</title>
 
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

  <style>
   body {
  background-color: #fdfaf8;
  font-family: 'Segoe UI', sans-serif;
}

/* Contenedor de los botones */
.contenedor-botones {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 40px;
  margin-top: 60px;
  padding: 0 1rem;
}

/* Botón flotante */
.boton-flotante {
  width: 280px;
  min-height: 150px;
  border-radius: 16px;
  background: #ffffff;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
  transition: all 0.25s ease;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border: 1px solid #eee;
  padding: 20px;
  text-align: center;
  text-decoration: none;
}

.boton-flotante:hover {
  transform: translateY(-4px);
  box-shadow: 0 6px 16px rgba(0,0,0,0.12);
  background-color: #fffaf4;
}

/* Ícono */
.boton-flotante i {
  font-size: 40px;
  margin-bottom: 12px;
  color: #fd7e14; /* naranja moderno */
}

/* Texto */
.boton-flotante span {
  font-size: 1.05rem;
  font-weight: 600;
  color: #333;
}

/* Responsive para móviles */
@media (max-width: 576px) {
  .boton-flotante {
    width: 100%;
    padding: 24px 16px;
    min-height: auto;
  }

  .boton-flotante i {
    font-size: 32px;
    margin-bottom: 10px;
  }

  .boton-flotante span {
    font-size: 1rem;
  }
}

  </style>
</head>

<div class="container my-5">
  <div class="row justify-content-center g-4">
    
    <div class="col-12 col-sm-6 col-lg-5">
      <div class="boton-flotante shadow-sm" onclick="location.href='ConsolidadoProductoFabricacion.html'">
        <i class="bi-bar-chart-fill"></i>
        <span class="fw-semibold texto">Consolidado Producto por Fabricar </span>
      </div>
    </div>

    <div class="col-12 col-sm-6 col-lg-5">
      <div class="boton-flotante shadow-sm" onclick="location.href='ResumenPrePedido.html'">
        <i class="bi bi-calendar-event-fill icono"></i>
        <span class="fw-semibold texto">Reporte PrePedido por Día</span>
      </div>
    </div>

    <div class="col-12 col-sm-6 col-lg-5">
      <div class="boton-flotante shadow-sm" onclick="location.href='ReporteVentaTalla.html'">
        <i class="bi bi-grid-3x3-gap-fill icono"></i>
        <span class="fw-semibold texto">Reporte de Pre‑Pedidos por Talla</span>
      </div>
    </div>

    <div class="col-12 col-sm-6 col-lg-5">
      <div class="boton-flotante shadow-sm" onclick="location.href='ReporteDashboardPedidoKPI.html'">
        <i class="bi bi-clipboard-data-fill icono"></i>
        <span class="fw-semibold texto">Reporte de Pedido ERP </span>
      </div>
    </div>
    



  </div>
</div>
</html>
