<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Gestión de Imágenes - Azaleia</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    :root {
      --azaleia-orange: #e86f27;
      --azaleia-dark: #222;
      --azaleia-light: #fff8f3;
    }

    body {
      margin: 0;
      padding: 20px;
      font-family: 'Inter', sans-serif;
      background: var(--azaleia-light);
      color: var(--azaleia-dark);
    }

    .dropzone {
      border: 3px dashed var(--azaleia-orange);
      border-radius: 16px;
      padding: 40px;
      text-align: center;
      background-color: #fff3ea;
      color: var(--azaleia-dark);
      font-size: 16px;
      margin-bottom: 20px;
      position: relative;
      cursor: pointer;
    }

    .dropzone input {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
    }

    .dropzone.dragover {
      background-color: #ffe1cc;
      border-color: #d65e1f;
    }

   .card-gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 16px;
  margin-top: 20px;
}

.card {
  border: 1px solid #ccc;
  border-radius: 10px;
  padding: 10px;
  text-align: center;
  box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
  transition: transform 0.2s ease;
  background-color: #fff;
}

.card:hover {
  transform: scale(1.03);
}

.card img {
  width: 100%;
  height: 120px;
  object-fit: cover;
  border-radius: 6px;
  margin-bottom: 8px;
}

.card p {
  font-size: 0.85rem;
  color: #333;
  margin: 0;
  word-break: break-word;
}


    .btn-azaleia {
      background-color: #e26c20;
      color: white;
      border-radius: 50px;
      padding: 8px 20px;
      border: none;
      transition: background-color 0.3s ease;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
      margin-bottom: 16px;
    }

    .btn-azaleia:hover {
      background-color: #c45d1c;
      color: white;
    }
  </style>
</head>
<body>
  <div id="dropzone" class="dropzone">
    <div class="mb-3">
      <i class="bi bi-cloud-arrow-up-fill fs-1 text-primary"></i>
    </div>
    <strong class="d-block fs-5 mb-2">Arrastra y suelta tus imágenes aquí</strong>
    <span class="text-muted">o haz clic para seleccionarlas</span>
    <input type="file" id="fileInput" accept="image/*" multiple>
  </div>

  <button type="button" class="btn btn-azaleia" onclick="subirImagenes()">Subir imágenes</button>

  <div id="galeriaSubida" class="card-gallery"></div>

  <script>
    let archivosSeleccionados = [];

    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');
    const galeriaSubida = document.getElementById('galeriaSubida');

    function mostrarGaleria() {
      galeriaSubida.innerHTML = '';
      archivosSeleccionados.forEach(file => {
        const url = URL.createObjectURL(file);
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <img src="${url}" alt="Imagen subida">
          <p><strong>${file.name}</strong></p>
        `;
        galeriaSubida.appendChild(card);
      });
    }

    function procesarArchivos(files) {
      for (let file of files) {
        if (file.type.startsWith('image/')) {
          archivosSeleccionados.push(file);
        } else {
          Swal.fire({
            icon: 'error',
            title: 'Archivo no válido',
            text: `Solo se permiten imágenes. El archivo "${file.name}" fue omitido.`,
          });
        }
      }
      mostrarGaleria();
    }

    ['dragenter', 'dragover'].forEach(eventName => {
      dropzone.addEventListener(eventName, e => {
        e.preventDefault();
        dropzone.classList.add('dragover');
      });
    });

    ['dragleave', 'drop'].forEach(eventName => {
      dropzone.addEventListener(eventName, e => {
        e.preventDefault();
        dropzone.classList.remove('dragover');
      });
    });

    dropzone.addEventListener('drop', e => {
      procesarArchivos(e.dataTransfer.files);
    });

    fileInput.addEventListener('change', e => {
      procesarArchivos(e.target.files);
    });

 function subirImagenes() {
  if (archivosSeleccionados.length === 0) {
    Swal.fire({
      icon: 'warning',
      text: 'No hay imágenes para subir.'
    });
    return;
  }

  const formData = new FormData();
  archivosSeleccionados.forEach(file => {
    formData.append("archivos", file);
  });

  Swal.fire({
    title: 'Subiendo imágenes...',
    allowOutsideClick: false,
    allowEscapeKey: false,
    didOpen: () => {
      Swal.showLoading();
    }
  });

  fetch("https://appsapventasapi.azurewebsites.net/api/AzureBlobStorage/SubirImagenesMasivaAsync", {
    method: "POST",
    body: formData
  })
  .then(res => res.json())
  .then(data => {
    Swal.close();

    Swal.fire({
      icon: 'success',
      text: data.mensaje || 'Imágenes subidas correctamente.',
      confirmButtonText: 'Aceptar'
    });

    // ✅ Limpiar galería y datos después de subir correctamente
    archivosSeleccionados = [];
    fileInput.value = '';
    galeriaSubida.innerHTML = '';
  })
  .catch(err => {
    Swal.close();
    Swal.fire({
      icon: 'error',
      title: 'Error',
      text: 'Error al subir las imágenes.'
    });
  });
}

  </script>
</body>
</html>
