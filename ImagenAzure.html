<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Gestión de Imágenes - Azaleia</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <!-- Inter font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --azaleia-orange: #e86f27;
      --azaleia-dark: #222;
      --azaleia-light: #fff8f3;
    }

    body {
      margin: 0;
      padding: 20px;
      font-family: 'Inter', sans-serif;
      background: var(--azaleia-light);
      color: var(--azaleia-dark);
    }

    .dropzone {
      border: 3px dashed var(--azaleia-orange);
      border-radius: 16px;
      padding: 40px;
      text-align: center;
      background-color: #fff3ea;
      color: var(--azaleia-dark);
      font-size: 16px;
      margin-bottom: 20px;
      position: relative;
      cursor: pointer;
    }

    .dropzone input {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
    }

    .dropzone.dragover {
      background-color: #ffe1cc;
      border-color: #d65e1f;
    }

    .table-scrollable {
      max-height: 400px;
      overflow-y: auto;
      overflow-x: auto;
      border-radius: 10px;
      background-color: white;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 600px;
    }

    th, td {
      padding: 12px 16px;
      text-align: left;
      vertical-align: middle;
    }

    th {
      position: sticky;
      top: 0;
      background-color: var(--azaleia-orange);
      color: white;
      font-weight: 600;
      z-index: 1;
    }

    tr:nth-child(even) {
      background-color: #f9f9f9;
    }

    .image-container {
      position: relative;
      display: inline-block;
    }

    .product-image {
      width: 40px;
      height: auto;
      object-fit: contain;
      border-radius: 4px;
      cursor: zoom-in;
    }

    .zoom-preview {
      display: none;
      position: fixed;
      z-index: 10000;
      width: 140px; /* antes 200px */
      border: 1px solid #ccc;
      background-color: #fff;
      padding: 2px;
      box-shadow: 0 0 8px rgba(0,0,0,0.15);
      border-radius: 6px;
    }

    @media (max-width: 768px) {
      table {
        min-width: 100%;
      }
    }

    .table-scrollable::-webkit-scrollbar {
      width: 8px;
    }

    .table-scrollable::-webkit-scrollbar-track {
      background: #f0f0f0;
      border-radius: 4px;
    }

    .table-scrollable::-webkit-scrollbar-thumb {
      background-color: #e86f27;
      border-radius: 4px;
    }
    @media (max-width: 768px) {
  .zoom-preview {
    width: 120px;
    box-shadow: 0 0 6px rgba(0,0,0,0.1);
  }
}
  </style>
</head>
<body>

  <!-- Dropzone -->
  <div id="dropzone" class="dropzone">
    <div class="mb-3">
      <i class="bi bi-cloud-arrow-up-fill fs-1 text-primary"></i>
    </div>
    <strong class="d-block fs-5 mb-2">Arrastra y suelta tus imágenes aquí</strong>
    <span class="text-muted">o haz clic para seleccionarlas</span>
    <input type="file" id="fileInput" accept="image/*" multiple>
  </div>
  <button onclick="subirImagenes()">Subir imágenes</button>

  <!-- Tabla -->
  <div class="table-scrollable">
    <table>
      <thead>
        <tr>
          <th>NRO</th>
          <th>IMAGEN</th>
          <th>NOMBRE</th>
          <th>EXTENSIÓN</th>
          <th>FECHA</th>
        </tr>
      </thead>
      <tbody id="tablaImagenes">
        <!-- Filas dinámicas -->
      </tbody>
    </table>
  </div>

  <!-- Script -->
  <script>
    let contador = 1;
    const tabla = document.getElementById('tablaImagenes');
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');
    const nombresImagenes = [];

    function agregarFila(file, url) {
      const nombre = file.name.split('.')[0];
      const extension = '.' + file.name.split('.').pop();
      const fecha = new Date().toLocaleDateString('es-PE');

      nombresImagenes.push({ nombre: nombre });

      const row = document.createElement('tr');
      row.innerHTML = `
        <td>${contador++}</td>
        <td>
          <div class="image-container">
            <img src="${url}" alt="Producto" class="product-image">
            <div class="zoom-preview">
              <img src="${url}" alt="Zoom Producto" style="max-width: 100%; height: auto; display: block;">
            </div>
          </div>
        </td>
        <td>${nombre}${extension}</td>
        <td>${extension}</td>
        <td>${fecha}</td>
      `;
      tabla.appendChild(row);

      // Asignar eventos de zoom dinámicamente
      const img = row.querySelector('.product-image');
      const zoom = row.querySelector('.zoom-preview');

      img.addEventListener("mouseenter", function () {
        zoom.style.display = "block";
      });
      img.addEventListener("mouseleave", function () {
        zoom.style.display = "none";
      });
     
    }


 const archivosSeleccionados = [];
    function procesarArchivos(files) {
      for (let file of files) {
        if (file.type.startsWith('image/')) {
          const url = URL.createObjectURL(file);
          agregarFila(file, url);
          archivosSeleccionados.push(file); // Guardar para POST
          console.log(archivosSeleccionados);
        }
      }
    }

    // Drag & Drop
    ['dragenter', 'dragover'].forEach(eventName => {
      dropzone.addEventListener(eventName, e => {
        e.preventDefault();
        dropzone.classList.add('dragover');
      });
    });

    ['dragleave', 'drop'].forEach(eventName => {
      dropzone.addEventListener(eventName, e => {
        e.preventDefault();
        dropzone.classList.remove('dragover');
      });
    });

    dropzone.addEventListener('drop', e => {
      procesarArchivos(e.dataTransfer.files);
    });

    fileInput.addEventListener('change', e => {
      procesarArchivos(e.target.files);
    });

    function subirImagenes() {
      if (archivosSeleccionados.length === 0 || nombresImagenes.length === 0) {
        alert("No hay imágenes para subir.");
        return;
      }

      const formData = new FormData();
      
      // Adjunta archivos y nombres
      for (let i = 0; i < archivosSeleccionados.length; i++) {
        formData.append("archivos", archivosSeleccionados[i]);            // archivos[]
           
      }
      nombresImagenes.forEach(n => {    // nombres[]
        formData.append("nombres", n.nombre);
      });

     // formData.append("contenedor", "subirimagenazure"); // Nombre del contenedor

      fetch("http://localhost:5232/api/ProcesoPrePedido/SubirImagenesAsync", {
        method: "POST",
        body: formData
      })
      .then(async res => {
        const contentType = res.headers.get("content-type");
        if (contentType && contentType.includes("application/json")) {
          return res.json();
        } else {
          const text = await res.text();
          throw new Error("Respuesta no es JSON: " + text);
        }
      })
      .then(data => {
        console.log("✅ Respuesta:", data);
        alert(data.mensaje || "Imágenes subidas correctamente");
      })
      .catch(err => {
        console.error("❌ Error al subir imágenes:", err);
        alert("Error al subir las imágenes");
      });
    }
    // Mover el zoom flotante junto al cursor
  document.addEventListener("mousemove", function (e) {
    const zooms = document.querySelectorAll(".zoom-preview");
    zooms.forEach(zoom => {
      if (zoom.style.display === "block") {
        const zoomWidth = zoom.offsetWidth;
        const zoomHeight = zoom.offsetHeight;
        const padding = 20;

        // Verifica si hay espacio suficiente abajo
        const fitsBelow = e.clientY + padding + zoomHeight < window.innerHeight;
        const fitsRight = e.clientX + padding + zoomWidth < window.innerWidth;

        zoom.style.top = `${fitsBelow ? e.clientY + padding : e.clientY - zoomHeight - padding}px`;
        zoom.style.left = `${fitsRight ? e.clientX + padding : e.clientX - zoomWidth - padding}px`;
      }
    });
  });
  </script>
</body>
</html>
