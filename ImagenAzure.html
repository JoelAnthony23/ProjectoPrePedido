<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Gestión de Imágenes - Azaleia</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <!-- Inter font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    :root {
      --azaleia-orange: #e86f27;
      --azaleia-dark: #222;
      --azaleia-light: #fff8f3;
    }

    body {
      margin: 0;
      padding: 20px;
      font-family: 'Inter', sans-serif;
      background: var(--azaleia-light);
      color: var(--azaleia-dark);
    }

    .dropzone {
      border: 3px dashed var(--azaleia-orange);
      border-radius: 16px;
      padding: 40px;
      text-align: center;
      background-color: #fff3ea;
      color: var(--azaleia-dark);
      font-size: 16px;
      margin-bottom: 20px;
      position: relative;
      cursor: pointer;
    }

    .dropzone input {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
    }

    .dropzone.dragover {
      background-color: #ffe1cc;
      border-color: #d65e1f;
    }

    .table-scrollable {
      max-height: 400px;
      overflow-y: auto;
      overflow-x: auto;
      border-radius: 10px;
      background-color: white;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 600px;
    }

    th, td {
      padding: 12px 16px;
      text-align: left;
      vertical-align: middle;
    }

    th {
      position: sticky;
      top: 0;
      background-color: var(--azaleia-orange);
      color: white;
      font-weight: 600;
      z-index: 1;
    }

    tr:nth-child(even) {
      background-color: #f9f9f9;
    }

    .image-container {
      position: relative;
      display: inline-block;
    }

    .image-container .product-image {
  max-width: 70px;
  border-radius: 8px;
  border: 2px solid #e26c20;
  cursor: zoom-in;
  transition: transform 0.2s ease;
}

.image-container:hover .zoom-preview {
  display: block;
}


    .product-image {
      width: 40px;
      height: auto;
      object-fit: contain;
      border-radius: 4px;
      cursor: zoom-in;
    }

    .zoom-preview {
      display: none;
      position: fixed;
      z-index: 10000;
      width: 140px; /* antes 200px */
      border: 1px solid #ccc;
      background-color: #fff;
      padding: 2px;
      box-shadow: 0 0 8px rgba(0,0,0,0.15);
      border-radius: 6px;
    }
    .zoom-preview img {
  width: 100%; /* mejor usar 100% para llenar el contenedor */
  border-radius: 6px;
}

    @media (max-width: 768px) {
      table {
        min-width: 100%;
      }
    }

    .table-scrollable::-webkit-scrollbar {
      width: 8px;
    }

    .table-scrollable::-webkit-scrollbar-track {
      background: #f0f0f0;
      border-radius: 4px;
    }

    .table-scrollable::-webkit-scrollbar-thumb {
      background-color: #e86f27;
      border-radius: 4px;
    }
    @media (max-width: 768px) {
  .zoom-preview {
    width: 120px;
    box-shadow: 0 0 6px rgba(0,0,0,0.1);
  }
}
.btn-azaleia {
  background-color: #e26c20;
  color: white;
  border-radius: 50px;
  padding: 8px 20px;
  border: none;
  transition: background-color 0.3s ease;
  box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
  margin-bottom: 16px;
}

.btn-azaleia:hover {
  background-color: #c45d1c;
  color: white;
}

/* Botón outline Azaleia */
.btn-azaleia-outline {
  background-color: white;
  color: #e26c20;
  border: 2px solid #e26c20;
  border-radius: 50px;
  padding: 8px 20px;
  transition: all 0.3s ease;
  box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
}

.btn-azaleia-outline:hover {
  background-color: #e26c20;
  color: white;
}
.product-image {
  width: 120px;       /* Aumenta el ancho */
  height: auto;       /* Mantiene la proporción */
  cursor: pointer;
  border-radius: 6px;
  transition: transform 0.2s ease;
}
.product-image:hover {
  transform: scale(1.2); /* Agranda un 20% */
  z-index: 5;
}
.card-gallery {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-top: 20px;
    }
    .card {
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 10px;
      width: 200px;
      text-align: center;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
    }
    .card img {
      max-width: 100%;
      border-radius: 4px;
    }
    .oculto {
  display: none;
}

  </style>
</head>
<body>

  <!-- Dropzone -->
  <div id="dropzone" class="dropzone">
    <div class="mb-3">
      <i class="bi bi-cloud-arrow-up-fill fs-1 text-primary"></i>
    </div>
    <strong class="d-block fs-5 mb-2">Arrastra y suelta tus imágenes aquí</strong>
    <span class="text-muted">o haz clic para seleccionarlas</span>
    <input type="file" id="fileInput" accept="image/*" multiple>
  </div>
  <button type="button" class="btn btn-azaleia" onclick="subirImagenes()">Subir imágenes</button>

  <!-- Tabla -->
  <div id="tablaImagenes" class="table-scrollable">
    <table > 
      <thead>
        <tr>
          <th>NRO</th>
          <th>IMAGEN</th>
          <th>NOMBRE</th>
          <th>EXTENSIÓN</th>
          <th>FECHA</th>
        </tr>
      </thead>
      <tbody id="cuerpoTablaImagenes">
        <!-- Filas dinámicas -->
      </tbody>
    </table>
  </div>

  <div id="galeriaSubida" class="card-gallery oculto"></div>

  <!-- Script -->
  <script>
    let contador = 1;
    const tabla = document.getElementById('cuerpoTablaImagenes');
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');
    const galeriaSubida = document.getElementById('galeriaSubida');
    const nombresImagenes = [];
    const archivosSeleccionados = [];
  
    function agregarFila(file, url) {
      const nombre = file.name.split('.')[0];
      const extension = '.' + file.name.split('.').pop();
      const fecha = new Date().toLocaleDateString('es-PE');
  
      nombresImagenes.push({ nombre: nombre });
  
      const row = document.createElement('tr');
      row.innerHTML = `
        <td>${contador++}</td>
        <td>
          <div class="image-container">
            <img src="${url}" alt="Producto" class="product-image">
            <div class="zoom-preview">
              <img src="${url}" alt="Zoom Producto" style="max-width: 100%; height: auto; display: block;">
            </div>
          </div>
        </td>
        <td>${nombre}${extension}</td>
        <td>${extension}</td>
        <td>${fecha}</td>
      `;
      tabla.appendChild(row);
  
      // Zoom dinámico
      const img = row.querySelector('.product-image');
      const zoom = row.querySelector('.zoom-preview');
  
      img.addEventListener("mouseenter", () => zoom.style.display = "block");
      img.addEventListener("mouseleave", () => zoom.style.display = "none");
    }
  
    function procesarArchivos(files) {
      for (let file of files) {
        if (file.type.startsWith('image/')) {
          const url = URL.createObjectURL(file);
          agregarFila(file, url);
          archivosSeleccionados.push(file);
        } else {
          Swal.fire({
            icon: 'error',
            title: 'Archivo no válido',
            text: `Solo se permiten imágenes. El archivo "${file.name}" fue omitido.`,
          });
        }
      }
    }
  
    // Drag & Drop
    ['dragenter', 'dragover'].forEach(eventName => {
      dropzone.addEventListener(eventName, e => {
        e.preventDefault();
        dropzone.classList.add('dragover');
      });
    });
  
    ['dragleave', 'drop'].forEach(eventName => {
      dropzone.addEventListener(eventName, e => {
        e.preventDefault();
        dropzone.classList.remove('dragover');
      });
    });
  
    dropzone.addEventListener('drop', e => {
      procesarArchivos(e.dataTransfer.files);
    });
  
    fileInput.addEventListener('change', e => {
      procesarArchivos(e.target.files);
    });
  
    function subirImagenes() {
  if (archivosSeleccionados.length === 0 || nombresImagenes.length === 0) {
    Swal.fire({
      icon: 'warning',
      text: 'No hay imágenes para subir.'
    });
    return;
  }

  const formData = new FormData();
  archivosSeleccionados.forEach(file => {
    formData.append("archivos", file);
  });

  Swal.fire({
    title: 'Subiendo imágenes...',
    allowOutsideClick: false,
    allowEscapeKey: false,
    didOpen: () => {
      Swal.showLoading();
    }
  });

  fetch("https://appsapventasapi.azurewebsites.net/api/AzureBlobStorage/SubirImagenesMasivaAsync", {
    method: "POST",
    body: formData
  })
  .then(async res => {
    const contentType = res.headers.get("content-type");
    if (contentType && contentType.includes("application/json")) {
      return res.json();
    } else {
      const text = await res.text();
      throw new Error("Respuesta no es JSON: " + text);
    }
  })
  .then(data => {
    Swal.close();

    Swal.fire({
      icon: 'success',
      text: data.mensaje || 'Imágenes subidas correctamente.',
      confirmButtonText: 'Aceptar'
    });

    // ✅ Ocultar tabla y mostrar galería
    document.getElementById("tablaImagenes").classList.add("oculto");
    document.getElementById("galeriaSubida").classList.remove("oculto");

    mostrarGaleria();

    // ✅ Limpiar tabla y arrays
    tabla.innerHTML = "";
    contador = 1;
    archivosSeleccionados.length = 0;
    nombresImagenes.length = 0;
    fileInput.value = "";
  })
  .catch(err => {
    Swal.close();
    Swal.fire({
      icon: 'error',
      title: 'Error',
      text: 'Error al subir las imágenes.'
    });
  });
}

    function mostrarGaleria() {
    galeriaSubida.innerHTML = ''; // Limpiar
    archivosSeleccionados.forEach(file => {
      const url = URL.createObjectURL(file);
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <img src="${url}" alt="Imagen subida">
        <p><strong>${file.name}</strong></p>
      `;
      galeriaSubida.appendChild(card);
    });
  }
  
    // Mover el zoom flotante junto al cursor
    document.addEventListener("mousemove", function (e) {
      const zooms = document.querySelectorAll(".zoom-preview");
      zooms.forEach(zoom => {
        if (zoom.style.display === "block") {
          const zoomWidth = zoom.offsetWidth;
          const zoomHeight = zoom.offsetHeight;
          const padding = 20;
  
          const fitsBelow = e.clientY + padding + zoomHeight < window.innerHeight;
          const fitsRight = e.clientX + padding + zoomWidth < window.innerWidth;
  
          zoom.style.top = `${fitsBelow ? e.clientY + padding : e.clientY - zoomHeight - padding}px`;
          zoom.style.left = `${fitsRight ? e.clientX + padding : e.clientX - zoomWidth - padding}px`;
        }
      });
    });
  </script>
  
</body>
</html>
