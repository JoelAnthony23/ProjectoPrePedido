<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Tabla con datos de API</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
  th, td {
    white-space: nowrap; /* Evita que el contenido se rompa en varias líneas */
  }
      h2, h4,h5 {
      color: #d46321;
    }
    /* Botón sólido color Azaleia */
.btn-azaleia {
  background-color: #e26c20;
  color: white;
  border-radius: 50px;
  padding: 8px 20px;
  border: none;
  transition: background-color 0.3s ease;
  box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
}

.btn-azaleia:hover {
  background-color: #c45d1c;
  color: white;
}

/* Botón outline Azaleia */
.btn-azaleia-outline {
  background-color: white;
  color: #e26c20;
  border: 2px solid #e26c20;
  border-radius: 50px;
  padding: 8px 20px;
  transition: all 0.3s ease;
  box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
}

.btn-azaleia-outline:hover {
  background-color: #e26c20;
  color: white;
}
/* Encabezado color Azaleia */
.azaleia-header {
  background-color: #e26c20 !important; /* Color principal Azaleia */
  color: white !important;
}

.azaleia-header th {
  background-color: #e26c20 !important;
  color: white !important;
}

.btn-campania {
    background-color: #d46321;
    border: none;
    color: #fff;
    padding: 10px 20px;
    font-weight: 500;
    border-radius: 8px;
    transition: background-color 0.3s ease;
  }

  .btn-campania:hover {
    background-color: 	#b34710;
  }
  #spinner-overlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  background: rgba(0, 0, 0, 0.4); /* Fondo oscurecido */
  width: 100%;
  height: 100%;
  z-index: 1100;
}

.spinner-border.orange {
  color: #e26c20;
  width: 4rem;
  height: 4rem;
  position: absolute;
  top: 50%;
  left: 50%;
  margin-top: -2rem;
  margin-left: -2rem;
}
</style>
</head>
<body class="bg-light p-4">
  <div class="container">
         <div    class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold mb-0" style="color:#e26c20;">Campaña</h2>

        <div class="btn-group" role="group" aria-label="Acciones de producto">
            <button type="button" class="btn btn-azaleia" id="btnAgregar" data-bs-toggle="modal" data-bs-target="#detalleModal">
            <i class="bi bi-plus-lg me-2"></i>Agregar Campaña
            </button>
 
        </div>
      </div>
    <div class="mb-3">
        <input type="text" id="buscador" class="form-control" placeholder="Buscar campaña por nombre, codigo...">
      </div>
    <div class="table-responsive" style="overflow-x: auto;">
      <table class="table table-bordered table-hover align-middle w-100">
        <thead class="azaleia-header text-white">
          <tr>
            <th>Codigo</th>
            <th>Campaña</th>
            <th>FechaInicio</th>
            <th>FechaFin</th>
          </tr>
        </thead>
        <tbody id="data-body"></tbody>
      </table>
    </div>
    <button type="button" class="btn btn-azaleia" onclick="window.location.href='Gestionar.html'">
   <i class="bi bi-arrow-left"></i> Regresar
</button>
  </div>

  <!-- Modal -->
  <div class="modal fade" id="detalleModal" tabindex="-1" aria-labelledby="detalleModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="detalleModalLabel">Detalle del reclamo</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>
        <div class="modal-body" id="modal-body"><!-- se llena dinámicamente --></div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
        </div>
      </div>
    </div>
  </div>

   <!----------------------SPINNER---------------------------------->
 
<div id="spinner-overlay">
  <div class="spinner-border orange" role="status">
    <span class="visually-hidden">Cargando...</span>
  </div>
</div>
 <!-------------------------------------------------------->

  <!-- Bootstrap bundle primero -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Tu script después de que Bootstrap ya existe -->
<script>
//<!------------------------------------------------------------->
let codvendedor = "";
window.addEventListener('DOMContentLoaded', () => {
  const usuario = localStorage.getItem('usuario');
  if (!usuario) {
    alert('⚠️ Sesión no válida. Por favor, inicia sesión.');
    window.location.href = 'login.html';
    return;
  }
  codvendedor = usuario;
  const span = document.getElementById('nombre-usuario');
  if (span) span.textContent = codvendedor;
});

const tbody = document.getElementById('data-body');
let url = 'https://appsapventasapi.azurewebsites.net/api/ProcesoPrePedido/GetBusquedaCampaniaAsync';

mostrarSpinner(); // ⏳ Mostrar antes de empezar la carga

fetch(url)
  .then(r => r.json())
  .then(data => {
    pintarTabla(data);
  })
  .catch(error => {
    console.error(error);
    tbody.innerHTML = '<tr><td colspan="8" class="text-danger text-center">Error al cargar los datos</td></tr>';
  })
  .finally(() => {
    ocultarSpinner(); // ✅ Ocultar al terminar, incluso si hubo error
  });


function pintarTabla(datos) {
  tbody.innerHTML = '';
  datos.forEach(u => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${u.codigoCampania}</td>
      <td>${u.descripcion}</td>
      <td>${u.fechaInicio}</td>
      <td>${u.fechaFin}</td>
    `;
    tbody.appendChild(tr);
  });
}

async function actualizarCampanias() {
  try {
    const response = await fetch(url);
    if (!response.ok) throw new Error(`Error ${response.status}`);
    const data = await response.json();
    pintarTabla(data);

  } catch (error) {
    console.error('Error actualizando campañas:', error);
    tbody.innerHTML = '<tr><td colspan="4" class="text-danger">Error al recargar campañas.</td></tr>';
  }
}


document.getElementById('buscador').addEventListener('input', function () {
  const filtro = this.value.toLowerCase();
  document.querySelectorAll('#data-body tr').forEach(fila => {
    const textoFila = fila.textContent.toLowerCase();
    fila.style.display = textoFila.includes(filtro) ? '' : 'none';
  });
});

let codigoCampania = "";
async function obtenerCodigoCampania() {
  try {
    const response = await fetch('https://appsapventasapi.azurewebsites.net/api/ProcesoPrePedido/GenerarCorrelativoCampaniaAsync');
    if (!response.ok) throw new Error(`Error ${response.status}`);
    const data = await response.json();
    codigoCampania = data.nroPrePedido;
    document.getElementById('codigoCampania').value = codigoCampania;
  } catch (error) {
    console.error('Error al obtener correlativo:', error);
    document.getElementById('codigoCampania').value = 'ERROR';
  }
}

obtenerCodigoCampania();

const contenidoFormulario = `
  <form id="formCampania" class="p-3 rounded shadow-sm border bg-white">
    <div class="row mb-3">
      <div class="col-md-4">
        <label for="codigoCampania" class="form-label fw-bold">Código Campaña</label>
        <input type="text" id="codigoCampania" name="codigoCampania" class="form-control bg-light" readonly>
      </div>
      <div class="col-md-8">
        <label for="nombreCampania" class="form-label fw-bold">Nombre Campaña</label>
        <input type="text" id="Descripcion" name="Descripcion" class="form-control" placeholder="Ej. Campaña Invierno 2025" required>
      </div>
    </div>
    <div class="row mb-3">
      <div class="col-md-6">
        <label for="fechaInicio" class="form-label fw-bold">Fecha Inicio</label>
        <input type="date" id="fechaInicio" name="fechaInicio" class="form-control" required>
      </div>
      <div class="col-md-6">
        <label for="fechaFin" class="form-label fw-bold">Fecha Fin</label>
        <input type="date" id="fechaFin" name="fechaFin" class="form-control" required>
      </div>
    </div>
    <div class="d-flex justify-content-end mt-4">
      <button id="btnGuardar" type="submit" class="btn btn-azaleia px-4">💾 Guardar</button>
    </div>
  </form>
`;

document.getElementById('modal-body').innerHTML = contenidoFormulario;

setTimeout(() => {
  const form = document.getElementById('formCampania');
  form.addEventListener('submit', async function (e) {
    e.preventDefault();
    const dataForm = Object.fromEntries(new FormData(form));
    dataForm.UsuarioRegistra = codvendedor;
    try {
      const res = await fetch('https://appsapventasapi.azurewebsites.net/api/ProcesoPrePedido/InsertCampaniaAsync', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(dataForm)
      });
      const result = await res.json();
      if (result === true) {
        Swal.fire({ icon: 'success', text: '✅ Campaña registrada con éxito.' });
        form.reset();
        document.getElementById('detalleModal').querySelector('.btn-close').click();
        await actualizarCampanias();
        await obtenerCodigoCampania();
      } else {
        Swal.fire({ icon: 'error', text: '❌ No se pudo registrar la campaña. Intenta nuevamente.' });
      }
    } catch (err) {
      console.error("Error al registrar campaña:", err);
      Swal.fire({ icon: 'error', text: '❌ Error inesperado. Revisa la consola para más detalles.' });
    }
  });
}, 100);

// Spinner
function mostrarSpinner() {
  document.getElementById('spinner-overlay').style.display = 'flex';
}

function ocultarSpinner() {
  document.getElementById('spinner-overlay').style.display = 'none';
}

</script>

</body>
</html>
