<script>
//<!------------------------------------------------------------->
// Variable global para el código del vendedor
let codvendedor = "";

// Validar sesión y mostrar nombre de usuario
window.addEventListener('DOMContentLoaded', () => {
  const usuario = localStorage.getItem('usuario');
  if (!usuario) {
    alert('⚠️ Sesión no válida. Por favor, inicia sesión.');
    window.location.href = 'login.html';
    return;
  }
  codvendedor = usuario;
  const span = document.getElementById('nombre-usuario');
  if (span) span.textContent = codvendedor;
});

// Spinner
function mostrarSpinner() {
  document.getElementById('spinner-overlay').style.display = 'block';
}

function ocultarSpinner() {
  document.getElementById('spinner-overlay').style.display = 'none';
}

// Encabezados esperados para validar Excel
const columnasEsperadas = [
  "Marca",
  "CodColeccion",
  "NomColeccion",
  "CodLinea",
  "NomLinea",
  "CodReferenciaLinea",
  "NomReferenciaLinea",
  "CodColor",
  "NomColor"
];

function validarEncabezados(jsonData) {
  if (!jsonData || jsonData.length === 0) return false;
  const encabezadosExcel = Object.keys(jsonData[0]);
  const faltantes = columnasEsperadas.filter(col => !encabezadosExcel.includes(col));
  if (faltantes.length > 0) {
    Swal.fire({
      icon: 'error',
      title: 'Formato inválido',
      html: `Faltan columnas:<ul>${faltantes.map(col => `<li>${col}</li>`).join('')}</ul>`
    });
    return false;
  }
  return true;
}

// Cargar datos del catálogo
const tbody = document.getElementById('data-body');
const url = 'https://appsapventasapi.azurewebsites.net/api/ProcesoPrePedido/GetBusquedaCatalogoAsync';
//const url = 'http://localhost:5232/api/ProcesoPrePedido/GetBusquedaCatalogoAsync';

mostrarSpinner(); // ⏳ Mostrar antes de empezar la carga

fetch(url)
  .then(r => r.json())
  .then(data => {
    pintarTabla(data);
  })
  .catch(error => {
    console.error(error);
    tbody.innerHTML = '<tr><td colspan="8" class="text-danger text-center">Error al cargar los datos</td></tr>';
  })
  .finally(() => {
    ocultarSpinner(); // ✅ Ocultar al terminar, incluso si hubo error
  });
  
// Función para abrir el formulario de registro de catálogo
async function pintarTabla(datos) {
  tbody.innerHTML = '';
  for (const u of datos) {
    const tr = document.createElement('tr');
    tr.setAttribute('data-catalogo', u.codCatalogo); // para usar en el evento de click
    tr.setAttribute('data-bs-toggle', 'modal');
    tr.setAttribute('data-bs-target', '#modalDetalleCatalogo');
    tr.style.cursor = 'pointer';
    tr.innerHTML = `
      <td>${u.codCatalogo}</td>
      <td>${u.nombreCatalogo}</td>
      <td>${u.fechaInicio}</td>
      <td>${u.fechaFin}</td>
      <td>${u.nroDocumento}</td>
      <td>${u.razonSocial}</td>
      <td>
        <button class="btn btn-sm btn-azaleia-outline ver-detalle" data-catalogo='${encodeURIComponent(u.codCatalogo)}'>
          <i class="bi bi-search"></i>
        </button>
      </td>`;
    tbody.appendChild(tr);
  }
}

// Evento adicional para detectar clics en la fila de la tabla (tbody ya debe existir en el DOM)
document.getElementById('data-body').addEventListener('click', async function (event) {
  const fila = event.target.closest('tr');
  if (!fila || !fila.hasAttribute('data-catalogo')) return;

  const codCatalogo = fila.getAttribute('data-catalogo');
  await cargarDetalleCatalogo(codCatalogo);

  const modal = new bootstrap.Modal(document.getElementById('modalDetalleCatalogo'));
  modal.show();
});

async function actualizarCampanias() {
  try {
    const response = await fetch(url);
    if (!response.ok) throw new Error(`Error ${response.status}`);
    const data = await response.json();
    pintarTabla(data);

  } catch (error) {

function abrirFormularioCatalogo() {
  document.getElementById('modal-body-catalogo').innerHTML = contenidoFormulario;
  const modal = new bootstrap.Modal(document.getElementById('modalFormularioCatalogo'));
  modal.show();
  obtenerNumeroPrePedido();

  const buscadorArticulo = document.getElementById('buscador-articulo');
  if (buscadorArticulo) {
    buscadorArticulo.addEventListener('input', function () {
      const filtro = this.value.toLowerCase();
      document.querySelectorAll('#data-body-excel tr').forEach(fila => {
        const textoFila = fila.textContent.toLowerCase();
        fila.style.display = textoFila.includes(filtro) ? '' : 'none';
      });
    });
  }

  const inputExcel = document.getElementById('input-excel');
  if (inputExcel) {
    inputExcel.addEventListener('change', async function (e) {
      const file = e.target.files[0];
      if (!file) return;
      mostrarSpinner();
      const reader = new FileReader();
      reader.onload = async function (e) {
        try {
          const data = new Uint8Array(e.target.result);
          const workbook = XLSX.read(data, { type: 'array' });
          const worksheet = workbook.Sheets[workbook.SheetNames[0]];
          const jsonData = XLSX.utils.sheet_to_json(worksheet, { defval: "" });
          if (!validarEncabezados(jsonData)) return;
          await renderArticulosDesdeExcel(jsonData);
        } catch (error) {
          console.error("Error procesando archivo:", error);
        } finally {
          ocultarSpinner();
        }
      };
      reader.readAsArrayBuffer(file);
    });
  }
}

/*METODO PARA INSERTAR */
async function generarPrePedido() {
  const nombreCatalogo = document.getElementById('NombreCatalogo').value;
  const codigoCampania = document.getElementById('CodigoCampania').value;
  const codFabricante = document.getElementById('CodigoFabricante').value.trim();
  const nombreFabricante = document.getElementById('Fabricante').value;

  if (!nombreCatalogo || !codigoCampania|| !codFabricante|| !nombreFabricante) {
    Swal.fire({ icon: 'error', text: 'Ingrese todo los campos' });
    return;
  }
  const filas = document.querySelectorAll('#data-body-excel tr');
  const articulosSeleccionados = Array.from(filas).map(fila => {
    const cells = fila.cells;
    return {
      marca: cells[1].textContent.trim(),
      codColeccion: cells[2].textContent.trim(),
      nomColeccion: cells[3].textContent.trim(),
      codLinea: cells[4].textContent.trim(),
      nomLinea: cells[5].textContent.trim(),
      codReferenciaLinea: cells[6].textContent.trim(),
      nomReferenciaLinea: cells[7].textContent.trim(),
      codColor: cells[8].textContent.trim(),
      nomColor: cells[9].textContent.trim(),
      desProducto: cells[10].textContent.trim(),
      rutaImagen: fila.querySelector('img.product-image')?.src || ''
    };
  });

  const pedido = {
    CodCatalogo: nroGenerado,
    nombreCatalogo,
    codigoCampania,
    codFabricante,
    nombreFabricante,
    lProductos: articulosSeleccionados
  };

  fetch('https://appsapventasapi.azurewebsites.net/api/ProcesoPrePedido/InsertCatalogoAsync', {
  //  fetch('http://localhost:5232/api/ProcesoPrePedido/InsertCatalogoAsync', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(pedido)
  })
    .then(res => res.json())
    .then(data => {
      if (data === true) {
        Swal.fire({ icon: 'success', text: '✅ Producto registrado con éxito.' });
        limpiarFormulario();
        const modal = bootstrap.Modal.getOrCreateInstance(document.getElementById('modalFormularioCatalogo'));
        modal.hide();
        actualizarCampanias();
      } else {
        Swal.fire({ icon: 'error', text: 'No se pudo registrar el producto. Intenta nuevamente.' });
      }
    })
    .catch(err => {
      console.error("Error al registrar producto", err);
      alert("❌ Error al registrar el producto. Consulta la consola para más detalles.");
    });
}

// Función para habilitar swipe en pantallas táctiles
function habilitarSwipeParaTarjetas() {
  const tarjetas = document.querySelectorAll('.producto-card');

  tarjetas.forEach(card => {
    let touchStartY = 0;
    let touchEndY = 0;

    card.addEventListener('touchstart', e => {
      touchStartY = e.changedTouches[0].clientY;
    });

    card.addEventListener('touchend', e => {
      touchEndY = e.changedTouches[0].clientY;

      if (touchStartY - touchEndY > 50) {
        // Swipe hacia arriba (mostrar)
        card.classList.add('show-detail');
        const icon = card.querySelector('.btn-toggle-detalle i');
        if (icon) icon.className = 'bi bi-chevron-up';
      } else if (touchEndY - touchStartY > 50) {
        // Swipe hacia abajo (ocultar)
        card.classList.remove('show-detail');
        const icon = card.querySelector('.btn-toggle-detalle i');
        if (icon) icon.className = 'bi bi-chevron-down';
      }
    });
  });
}

// Ejecutar swipe solo si es pantalla táctil (tablet o móvil)
if ('ontouchstart' in document.documentElement) {
  document.addEventListener('DOMContentLoaded', () => {
    habilitarSwipeParaTarjetas();
  });
}

});
