<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Tabla con datos de API</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
  th, td {
    white-space: nowrap; /* Evita que el contenido se rompa en varias líneas */
  }
</style>
</head>
<body class="bg-light p-4">
  <div class="container">
    <h2 class="mb-4">Lista de Reclamos</h2>
 <div class="mb-3">
    <input type="text" id="buscador" class="form-control" placeholder="Buscar reclamo por nombre, documento, ticket...">
  </div>
    <div class="table-responsive" style="overflow-x: auto;">
      <table class="table table-bordered table-hover table-striped align-middle w-100">
        <thead class="table-dark">
          <tr>
            <th>Folio</th>
            <th>Ticket</th>
            <th>Nombres</th>
            <th>Documento</th>
            <th>Celular</th>
            <th>Email</th>
            <th>Tipo Reclamo</th>
            <th>Marca</th>
            <th>Detalle</th>
          </tr>
        </thead>
        <tbody id="data-body"></tbody>
      </table>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal fade" id="detalleModal" tabindex="-1" aria-labelledby="detalleModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="detalleModalLabel">Detalle del reclamo</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>
        <div class="modal-body" id="modal-body"><!-- se llena dinámicamente --></div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap bundle primero -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Tu script después de que Bootstrap ya existe -->
  <script>
    // 1. Traer datos
    fetch('https://appsapventasapi.azurewebsites.net/api/Reclamaciones/ListReclamacionesAsync')
      .then(r => r.json())
      .then(data => pintarTabla(data))
      .catch(console.error);

    // 2. Llenar la tabla
    function pintarTabla(datos) {
      const tbody = document.getElementById('data-body');
      tbody.innerHTML = '';               // limpia por si acaso
      datos.forEach(u => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${u.nroFolio}</td>
          <td>${u.numeroTicket}</td>
          <td>${u.nombres}</td>
          <td>${u.nroDocumento}</td>
          <td>${u.telefono}</td>
          <td>${u.email}</td>
          <td>${u.tipoReclamo}</td>
          <td>${u.marca}</td>
          <td>
            <button
              class="btn btn-primary btn-sm"
              data-user='${encodeURIComponent(JSON.stringify(u))}'
              data-bs-toggle="modal"
              data-bs-target="#detalleModal">
              Ver detalle
            </button>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    // 3. Capturar apertura del modal y poblarlo
    const modal = document.getElementById('detalleModal');
    modal.addEventListener('show.bs.modal', event => {
      const button = event.relatedTarget;
      const user = JSON.parse(decodeURIComponent(button.getAttribute('data-user')));

      document.getElementById('modal-body').innerHTML = `
        <div class="row">
                <div class="col-md-6">
        <p><strong>Folio:</strong> ${user.nroFolio}</p>
        <p><strong>Ticket:</strong> ${user.numeroTicket}</p>
        <p><strong>Nombres:</strong> ${user.nombres}</p>
        <p><strong>Documento:</strong> ${user.nroDocumento}</p>
        <p><strong>Teléfono:</strong> ${user.telefono}</p>
        <p><strong>Email:</strong> ${user.email}</p>
          </div>
    <div class="col-md-6">
        <p><strong>Tipo Reclamo:</strong> ${user.tipoReclamo}</p>
        <p><strong>Monto :</strong> ${user.montoReclamado}</p>
        <p><strong>Fecha Ocurrencia:</strong> ${user.fechaOcurrencia}</p>
        <p><strong>Origen Ocurrencia:</strong> ${user.origenOcurrencia}</p>
        <p><strong>Lugar Reclamo:</strong> ${user.lugarReclamo}</p>
        <p><strong>Ubigeo:</strong> ${user.listaubigeo}</p>
        <p><strong>Marca:</strong> ${user.marca}</p>
        <hr>
    </div>
            <p><strong>Detalle del reclamo:</strong><br>
           ${user.detalleReclamo ?? 'Sin detalle registrado.'}</p>
  </div> 
      `;
    });
 
    document.getElementById('buscador').addEventListener('input', function () {
  const filtro = this.value.toLowerCase();
  const filas = document.querySelectorAll('#data-body tr');

  filas.forEach(fila => {
    const textoFila = fila.textContent.toLowerCase();
    fila.style.display = textoFila.includes(filtro) ? '' : 'none';
  });
});
  
  
  </script>
</body>
</html>
