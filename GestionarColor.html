<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Registrar Color | Azaleia</title>

  <!-- Fuentes e íconos -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <!-- Bootstrap CSS para inputs y estados is-valid/is-invalid -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    :root {
      --brand: #e26c20;
      --brand-dark: #be5816;
      --text: #222;
      --muted: #6b7280;
      --line: #e5e7eb;
      --bg: #ffffff;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Montserrat', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .container { max-width: 1200px; margin: 0 auto; padding: 24px 20px 72px; }

    .page-header { text-align: center; margin-bottom: 12px; }
    .page-title { margin: 0; font-weight: 700; color: --brand; }
    .page-sub { margin: 4px 0 18px; color: var(--muted); font-size: .95rem; }

    .segmented { display: inline-flex; gap: .5rem; align-items: center; background: #fff; border: 1px solid var(--line); border-radius: 999px; padding: .35rem; }
    .segmented input { display: none; }
    .segmented label {
      cursor: pointer; user-select: none; display: inline-flex; align-items: center; gap: .5rem;
      padding: .55rem 1rem; border-radius: 999px; font-weight: 700; color: #111; transition: background .25s, color .25s, border-color .25s;
    }
    .segmented label .dot { width: 18px; height: 18px; border-radius: 999px; border: 3px solid #111; position: relative; }
    .segmented input:checked + label { background: rgba(226,108,32,.12); color: var(--brand); }
    .segmented input:checked + label .dot { border-color: var(--brand); }
    .segmented input:checked + label .dot::after { content: ""; position: absolute; inset: 3px; background: var(--brand); border-radius: 999px; }

    section { margin-top: 22px; }
    .section-title { font-weight: 700; margin: 0 0 14px; color: #111; }

    label.form-label { display: block; font-weight: 700; color: #e17223; margin-bottom: 6px; }
    .field { width: 100%; padding: .65rem .8rem; border: 1px solid var(--line); border-radius: .6rem; outline: none; font: inherit; }
    .field:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(226,108,32,.15); }

    .grid { display: grid; gap: 14px; }
    @media (min-width: 768px){ .grid.cols-3 { grid-template-columns: 1fr 1fr auto; } }

    .btn { display: inline-flex; align-items: center; gap: .5rem; font-weight: 700; border-radius: .8rem; border: none; cursor: pointer; padding: .65rem 1.1rem; }
    .btn-primary { background: var(--brand); color: #fff; box-shadow: 0 6px 16px rgba(226,108,32,.2); }
    .btn-primary:hover { background: var(--brand-dark); }
    .btn-secondary { background: #e5e7eb; color: #111; }

    .table-wrap { overflow-x: auto; border-top: 1px solid var(--line); }
    table { width: 100%; border-collapse: separate; border-spacing: 0; }
    thead th { position: sticky; top: 0; background: var(--brand); color: #fff; text-align: left; font-weight: 700; padding: .7rem .75rem; }
    tbody td { padding: .7rem .75rem; border-bottom: 1px solid var(--line); }
    tbody tr:nth-child(even) { background: #fafafa; }

    .actions { position: sticky; bottom: 0; background: var(--bg); border-top: 1px solid var(--line); padding: 16px 0; display: flex; gap: 10px; justify-content: flex-end; }

    .hidden { display: none !important; }

    /* Spinner Overlay */
    #spinner-overlay{
      position:fixed;top:0;left:0;width:100%;height:100%;
      z-index:1100;display:none;background:rgba(0,0,0,.4)
    }
    .spinner-border.orange{
      color:#e26c20;position:absolute;top:50%;left:50%;margin-top:-2rem;margin-left:-2rem
    }
    /* Spinner base (sin Bootstrap) */
    .spinner-border{
      width:4rem;height:4rem;
      border: .45rem solid rgba(255,255,255,.35);
      border-top-color: currentColor;
      border-right-color: currentColor;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin{to{transform: rotate(360deg)}}
  </style>
</head>
<body>
  <header class="page-header container">
    <h1 class="page-title">Registrar Color</h1>
    <p class="page-sub">Elige el modo de registro: Inserción Manual o Carga Masiva.</p>

    <div class="segmented" role="tablist" aria-label="Modo de registro">
      <input type="radio" id="optManual" name="modo" value="manual" checked>
      <label for="optManual"><span class="dot"></span> Inserción Manual</label>

      <input type="radio" id="optMasiva" name="modo" value="masiva">
      <label for="optMasiva"><span class="dot"></span> Carga Masiva</label>
    </div>
  </header>

  <main class="container">
    <!-- Inserción Manual -->
    <section id="sec-manual">
      <h3 class="section-title"><i class="bi bi-palette-fill me-1"></i> Inserción Manual</h3>
      <div class="grid cols-3">
        <div>
          <label class="form-label">Código</label>
          <input type="text" class="field form-control" id="codigo" placeholder="Ingrese Código" maxlength="6" autocomplete="off"/>
        </div>
        <div>
          <label class="form-label">Descripción</label>
          <input type="text" class="field form-control" id="descripcion" placeholder="Ingrese Descripción" />
        </div>
      </div>
    </section>

    <!-- Carga Masiva -->
    <section id="sec-masiva" class="hidden">
      <h3 class="section-title"><i class="bi bi-cloud-arrow-up-fill me-1"></i> Carga Masiva</h3>

      <div class="grid" style="grid-template-columns:minmax(260px, 560px) 1fr; align-items:center;">
        <div>
          <label class="form-label">Seleccionar archivo Excel</label>
          <input type="file" id="archivoExcel" accept=".xlsx,.xls" class="form-control mb-3" />
        </div>
        <div style="color:var(--muted); font-size:.95rem;">Formatos aceptados: <strong>.xlsx</strong> y <strong>.xls</strong>. Se mostrará una vista previa de la primera hoja.</div>
      </div>

      <div class="table-wrap" style="margin-top:14px;">
        <table id="tablaMasiva">
          <thead>
            <tr>
              <th style="width:140px;">Código</th>
              <th>Descripción</th>
              <th style="width:180px;">Color Español</th>
              <th style="width:180px;">Color Inglés</th>
              <th style="width:220px;">Código CGI</th>
            </tr>
          </thead>
          <tbody id="tablaMasivaBody"></tbody>
        </table>
      </div>
    </section>

    <!-- Acciones -->
    <div class="actions">
      <button class="btn btn-primary" id="btnRegistrar"><i class="bi bi-check2-square"></i> Registrar</button>
      <button class="btn btn-secondary" id="btnCerrar"><i class="bi bi-x-lg"></i> Cerrar</button>
    </div>
    
    <!-- Spinner -->
    <div id="spinner-overlay">
      <div class="spinner-border orange" role="status"><span class="visually-hidden">Cargando...</span></div>
    </div>

  </main>

  <!-- SheetJS -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script>
    // ---------- Helpers spinner ----------
    function mostrarSpinner(){ document.getElementById('spinner-overlay').style.display='block'; }
    function ocultarSpinner(){ document.getElementById('spinner-overlay').style.display='none'; }
    const nextFrame = () => new Promise(r => requestAnimationFrame(r));
    const tick      = () => new Promise(r => setTimeout(r, 0));

    // ---------- Refs DOM ----------
    const secManual   = document.getElementById('sec-manual');
    const secMasiva   = document.getElementById('sec-masiva');
    const radios      = document.querySelectorAll('input[name="modo"]');
    const inputCodigo = document.getElementById('codigo');
    const inputDesc   = document.getElementById('descripcion');
    const btnRegistrar= document.getElementById('btnRegistrar');
    const fileInput   = document.getElementById('archivoExcel');
    const tbody       = document.getElementById('tablaMasivaBody');

    // ---------- Mensaje bajo "Código" ----------
    const codigoStatus = document.createElement('div');
    codigoStatus.id = 'codigoStatus';
    codigoStatus.className = 'form-text';
    inputCodigo.parentElement.appendChild(codigoStatus);

    // ---------- Utils ----------
    const debounce = (fn, delay = 500) => { let t; return (...a)=>{ clearTimeout(t); t=setTimeout(()=>fn(...a),delay); }; };
    function resetCodigoUI(){ inputCodigo.classList.remove('is-valid','is-invalid'); codigoStatus.textContent=''; codigoStatus.className='form-text'; }

    // ---------- Limpiar Manual / Masiva / Todo ----------
    function limpiarManual(){
      inputCodigo.value = '';
      inputDesc.value = '';
      resetCodigoUI();
    }
    function limpiarMasiva(){
      if (fileInput) fileInput.value = '';
      if (tbody) tbody.innerHTML = '';
    }
    function limpiarTodo(focusManual = false){
      ocultarSpinner();               // por si estaba visible
      limpiarManual();
      limpiarMasiva();
      btnRegistrar.disabled = false;  // habilita botones
      if (focusManual) inputCodigo.focus();
    }

    // ---------- Toggle de secciones ----------
    function syncModo(){
      const modo = document.querySelector('input[name="modo"]:checked').value;
      secManual.classList.toggle('hidden', modo !== 'manual');
      secMasiva.classList.toggle('hidden', modo !== 'masiva');
      // NUEVO: limpiar todo al cambiar y habilitar botones
      limpiarTodo(modo === 'manual');
    }
    radios.forEach(r => r.addEventListener('change', syncModo));
    syncModo();

    // ---------- Excel: leer y previsualizar ----------
    fileInput.addEventListener('change', async (e) => {
      const file = e.target.files && e.target.files[0];
      if (!file) return;

      mostrarSpinner();
      await nextFrame(); // deja pintar el overlay

      const reader = new FileReader();
      reader.onload = async (ev) => {
        try{
          await tick();
          const data = new Uint8Array(ev.target.result);
          const wb = XLSX.read(data, { type: 'array' });
          const ws = wb.Sheets[wb.SheetNames[0]];
          const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });
          await nextFrame();
          renderRows(rows);
        }catch(error){
       //   console.error(error);
          Swal.fire({icon:'error',title:'Error',text:'No se pudo procesar el archivo.'});
        }finally{
          ocultarSpinner();
          e.target.value=''; // permite volver a elegir el mismo archivo
        }
      };
      reader.onerror = () => {
        ocultarSpinner();
        Swal.fire({icon:'error',title:'Error',text:'No se pudo leer el archivo.'});
        e.target.value = '';
      };
      reader.readAsArrayBuffer(file);
    });

    function renderRows(rows){
      tbody.innerHTML = '';
      if (!rows || !rows.length) return;

      const pick = (row, keys) => { for (const k of keys) if (k in row) return row[k]; return ''; };
      let html = '';
      for (const row of rows) {
        const codigo      = esc(pick(row, ['Código','Codigo','CODIGO','codigo','COD_COR']));
        const descripcion = esc(pick(row, ['Descripción','Descripcion','DESCRIPCION','descripcion','NOME_COR']));
        const colorEs     = esc(pick(row, ['Color Español','Color_Espanol','ColorEspanol','COLOR_ESPANOL','NOME_COR_ESP']));
        const colorEn     = esc(pick(row, ['Color Ingles','Color_Ingles','ColorIngles','COLOR_INGLES','NOME_COR_ING']));
        const cgi         = esc(pick(row, ['Código CGI','Codigo CGI','Codigo_CGI','CGI','CODIGO_CGI','COD_COR_GCI']));
        html += `<tr>
          <td>${codigo}</td>
          <td>${descripcion}</td>
          <td>${colorEs}</td>
          <td>${colorEn}</td>
          <td>${cgi}</td>
        </tr>`;
      }
      tbody.innerHTML = html;
    }
    function esc(s){ return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','\'':'&#039;'}[m])); }

    // ---------- Validación remota de código (1 = existe) ----------
    async function validaCodigoExiste(code) {
      if (!code) return false;
      const url = `https://appsapweb1-awc5dkfue6hgdtbu.centralus-01.azurewebsites.net/api/ProcesoPrePedido/ValidaColorAsync?codigoColor=${encodeURIComponent(code)}`;
      const res = await fetch(url, { method: 'GET' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      let data; try { data = await res.json(); } catch { data = await res.text(); }
      const valor = (typeof data === 'string') ? data.trim() : data;
      return valor === 1 || valor === '1' || valor === true;
    }

    async function validarCodigoYMostrar(code) {
      const modo = document.querySelector('input[name="modo"]:checked').value;
      if (modo !== 'manual') return;
      if (!code) { resetCodigoUI(); btnRegistrar.disabled = false; return; }
      try {
        const existe = await validaCodigoExiste(code);
        if (existe) {
          inputCodigo.classList.add('is-invalid'); inputCodigo.classList.remove('is-valid');
          codigoStatus.textContent = 'Código ya existe'; codigoStatus.className = 'form-text text-danger';
          btnRegistrar.disabled = true;
        } else {
          inputCodigo.classList.add('is-valid'); inputCodigo.classList.remove('is-invalid');
          codigoStatus.textContent = 'Código disponible'; codigoStatus.className = 'form-text text-success';
          btnRegistrar.disabled = false;
        }
      } catch (err) {
      //  console.error('Validación código falló:', err);
        inputCodigo.classList.remove('is-valid', 'is-invalid');
        codigoStatus.textContent = 'No se pudo validar el código ahora.'; codigoStatus.className = 'form-text text-muted';
        btnRegistrar.disabled = false;
      }
    }

    inputCodigo.addEventListener('input', debounce(() => {
      const code = inputCodigo.value.trim();
      validarCodigoYMostrar(code);
    }, 500));
    inputCodigo.addEventListener('blur', () => {
      const code = inputCodigo.value.trim();
      validarCodigoYMostrar(code);
    });

    // ---------- Registrar ----------
    let codvendedor = "", payload = "", codigoColor = "";

    document.getElementById('btnRegistrar').addEventListener('click', async () => {
      const usuario = localStorage.getItem('usuario');
      if (!usuario) {
        Swal.fire({icon:'warning', title:'Alerta', text:'⚠️ Sesión no válida. Por favor, inicia sesión.'});
        window.location.href = 'login.html';
        return;
      }
      codvendedor = usuario;
      codigoColor = inputCodigo.value.trim();

      const modo = document.querySelector('input[name="modo"]:checked').value;
      const tipoRegistro = (modo === 'manual') ? 1 : 2;

      payload = { isSelecciona: tipoRegistro, CodVendedor: codvendedor, color: {}, lColor: [] };

      if (tipoRegistro === 1) {
        // Revalidación final
        try {
          const existe = await validaCodigoExiste(codigoColor);
          if (existe) {
            inputCodigo.classList.add('is-invalid'); inputCodigo.classList.remove('is-valid');
            codigoStatus.textContent = 'Código ya existe'; codigoStatus.className = 'form-text text-danger';
            Swal.fire({icon:'warning', title:'Alerta', text:'El código ya existe.'});
            return;
          }
        } catch (e) { console.warn('No se pudo revalidar antes de insertar:', e); }

        payload.color = {
          codigoColor: codigoColor,
          descripcionColor: inputDesc.value.trim(),
          descripcionColorEspanol: "",
          descripcionColorComercial: "",
          codColorBrasil: ""
        };

        try { await insertarColor(payload); }
        catch { Swal.fire({icon:'error',title:'Error',text:'Ocurrió un error al registrar el color.'}); }

      } else {
        const rows = [...tbody.querySelectorAll('tr')].map(tr => {
          const t = tr.querySelectorAll('td');
          return {
            codigoColor: t[0]?.textContent.trim() || '',
            descripcionColor: t[1]?.textContent.trim() || '',
            descripcionColorEspanol: t[2]?.textContent.trim() || '',
            descripcionColorComercial: t[3]?.textContent.trim() || '',
            codColorBrasil: t[4]?.textContent.trim() || ''                   
          };
        });

        if (rows.length === 0) { Swal.fire({icon:'error',title:'Error',text:'No hay datos para registrar.'}); return; }

        payload.lColor = rows;
        try { await insertarColor(payload); }
        catch { Swal.fire({icon:'error',title:'Error',text:'Ocurrió un error al registrar los colores masivamente.'}); }
      }
    });

    document.getElementById('btnCerrar').addEventListener('click', () => history.back());

    // ---------- POST insertar ----------
    async function insertarColor(payload) {
      mostrarSpinner();
      try {
        // Producción:
        const res = await fetch('https://appsapweb1-awc5dkfue6hgdtbu.centralus-01.azurewebsites.net/api/ProcesoPrePedido/InsertColorAsync', {
        // Dev local:
     //   const res = await fetch('http://localhost:5232/api/ProcesoPrePedido/InsertColorAsync', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        let data; try { data = await res.json(); } catch { data = await res.text(); }
        const valor = (typeof data === 'string') ? parseInt(data, 10) : data;

        ocultarSpinner();
            console.log('Respuesta insertarColor:', valor);
        if (valor === 1) {
          Swal.fire({icon:'success', text:'✅ Producto registrado con éxito.'});
          limpiarTodo(true); // limpia todo y enfoca código si estás en manual
        } else {
          Swal.fire({icon:'success', text:'Producto actualizado con éxito.'});
          limpiarTodo(true);
        }
      } catch (err) {
        ocultarSpinner();
        Swal.fire({icon:'error',title:'Error',text:'Ocurrió un error al registrar.'});
       // console.error(err);
      }
    }
  </script>
</body>
</html>
