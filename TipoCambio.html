<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Tabla con datos de API</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    th, td {
      white-space: nowrap; /* Evita que el contenido se rompa en varias líneas */
    }
  </style>
</head>

<body class="bg-light p-4">
  <div class="container">
    <h2 class="mb-4">Tipo de Cambio</h2>

    <!-- Spinner / Overlay -->
    <div id="loading"
         class="position-fixed top-0 start-0 w-100 h-100 d-flex flex-column justify-content-center align-items-center bg-white bg-opacity-75"
         style="z-index: 2000;">
      <div class="spinner-border text-primary" role="status" aria-hidden="true"></div>
      <div class="mt-3 fw-semibold">Cargando...</div>
    </div>

    <div class="mb-3">
      <input type="text" id="buscador" class="form-control" placeholder="Buscar tipo de cambio, usuario...">
    </div>

    <!-- Tabla (inicia oculta hasta terminar de cargar) -->
    <div id="tabla-container" class="table-responsive d-none" style="overflow-x: auto;">
      <table class="table table-bordered table-hover table-striped align-middle w-100">
        <thead class="table-dark">
          <tr>
            <th>Fecha Cambio</th>
            <th>Tipo Moneda</th>
            <th>Compra</th>
            <th>Venta</th>
            <th>Usuario</th>
            <th>Fecha Creacion</th>
            <th>Hora Creacion</th>
          </tr>
        </thead>
        <tbody id="data-body"></tbody>
      </table>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal fade" id="detalleModal" tabindex="-1" aria-labelledby="detalleModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="detalleModalLabel">Detalle del reclamo</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>
        <div class="modal-body" id="modal-body"><!-- se llena dinámicamente --></div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap bundle primero -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Tu script después de que Bootstrap ya existe -->
  <script>
    const loading = document.getElementById('loading');
    const tablaContainer = document.getElementById('tabla-container');

    function mostrarLoading() {
      loading.classList.remove('d-none');
      tablaContainer.classList.add('d-none');
    }

    function ocultarLoading() {
      loading.classList.add('d-none');
      tablaContainer.classList.remove('d-none');
    }

    // Mostrar spinner apenas arranca
    mostrarLoading();

    // 1. Traer datos
    fetch('https://appsapweb1-awc5dkfue6hgdtbu.centralus-01.azurewebsites.net/api/Reniec/ListaTipoCambioAsync')
      // fetch('http://localhost:5232/api/Reniec/ListaTipoCambioAsync')
      .then(r => r.json())
      .then(data => {
        pintarTabla(data);
        ocultarLoading();
      })
      .catch(err => {
        console.error(err);
        ocultarLoading(); // evita dejar la pantalla bloqueada
        alert('Ocurrió un error al cargar los datos.');
      });

    // 2. Llenar la tabla
    function pintarTabla(datos) {
      const tbody = document.getElementById('data-body');
      tbody.innerHTML = ''; // limpia por si acaso

      datos.forEach(u => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${u.fechaCambio ?? ''}</td>
          <td>${u.tipoMoneda ?? ''}</td>
          <td>${u.compra ?? ''}</td>
          <td>${u.venta ?? ''}</td>
          <td>${u.usuarioCreacion ?? ''}</td>
          <td>${u.fchCreacion ?? ''}</td>
          <td>${u.horaCreacion ?? ''}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    // Buscador
    document.getElementById('buscador').addEventListener('input', function () {
      const filtro = this.value.toLowerCase();
      const filas = document.querySelectorAll('#data-body tr');

      filas.forEach(fila => {
        const textoFila = fila.textContent.toLowerCase();
        fila.style.display = textoFila.includes(filtro) ? '' : 'none';
      });
    });
  </script>
</body>
</html>
