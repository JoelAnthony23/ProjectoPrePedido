<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Panel Admin - Azaleia</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
  <style>
    :root {
      --azaleia-color: #d46321;
      --azaleia-hover: #a9490f;
      --azaleia-bg: #fff5eb;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #fdf8f4;
      margin: 0;
    }

    .sidebar {
      background-color: var(--azaleia-color);
      color: white;
      height: 100vh;
      padding-top: 20px;
      position: fixed;
      width: 220px;
      z-index: 1000;
    }

    .sidebar .nav-link {
      color: #fff5eb;
      font-weight: 500;
      padding: 12px 20px;
    }

    .sidebar .nav-link.active,
    .sidebar .nav-link:hover {
      background-color: var(--azaleia-hover);
    }

    .main-content {
      margin-left: 220px;
      padding: 20px;
    }

    @media (max-width: 991px) {
      .sidebar {
        display: none;
      }
      .main-content {
        margin-left: 0;
      }
    }

    iframe {
      display: none;
      width: 100%;
      min-height: 85vh;
      border: none;
    }

    /* Navbar Azaleia personalizada */
    .navbar-azaleia {
      background-color: var(--azaleia-color) !important;
    }

    .navbar-azaleia .navbar-brand,
    .navbar-azaleia .nav-link,
    .navbar-azaleia .navbar-toggler {
      color: white !important;
    }

    .navbar-azaleia .nav-link:hover {
      color: #ffd4b3 !important;
    }

    .navbar-toggler-icon {
      background-image: url("data:image/svg+xml;charset=utf8,%3Csvg viewBox='0 0 30 30' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath stroke='white' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3E%3C/svg%3E");
    }

    .card-box {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.07);
    }
  </style>
</head>
<body>

<!-- SIDEBAR PARA PC -->
<div class="sidebar d-none d-lg-block" id="sidebar">
  <h5 class="text-white text-center mb-4">Panel de Control</h5>
  <ul class="nav flex-column" id="menuPc">
    <li class="nav-item"><a href="#" class="nav-link active" id="btnDashboardPc"><i class="fas fa-home me-2"></i>Dashboard</a></li>
    <li class="nav-item"><a href="#" class="nav-link" id="btnReclamosPc"><i class="fas fa-clipboard-list me-2"></i>Reclamos</a></li>
    <li class="nav-item"><a href="#" class="nav-link" id="btnGestionarPc"><i class="fas fa-cog me-2"></i>Gestionar</a></li>
    <li class="nav-item"><a href="#" class="nav-link" id="btnListaPrePedidoPc"><i class="fas fa-clipboard-list me-2"></i>Busqueda PrePedido</a></li>
    <li class="nav-item"><a href="#" class="nav-link" id="btnPrePedidoPc"><i class="fas fa-box-open me-2"></i>Generar PrePedido</a></li>
  </ul>
</div>

<!-- NAVBAR PARA TABLET Y CELULAR -->
<nav class="navbar navbar-expand-lg navbar-azaleia d-lg-none px-3">
  <a class="navbar-brand fw-bold" href="#">Panel de Control</a>
  <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMobile" aria-controls="navbarMobile" aria-expanded="false" aria-label="Toggle navigation">
    <span class="navbar-toggler-icon"></span>
  </button>
  <div class="collapse navbar-collapse" id="navbarMobile">
    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
      <li class="nav-item"><a class="nav-link" id="btnDashboardMb" href="#">Dashboard</a></li>
      <li class="nav-item"><a class="nav-link" id="btnReclamosMb" href="#">Reclamos</a></li>
      <li class="nav-item"><a class="nav-link" id="btnGestionarMb" href="#">Gestionar</a></li>
      <li class="nav-item"><a class="nav-link" id="btnListaPrePedidoMb" href="#">Busqueda PrePedido</a></li>
      <li class="nav-item"><a class="nav-link" id="btnPrePedidoMb" href="#">Generar PrePedido</a></li>
    </ul>
  </div>
</nav>

<!-- CONTENIDO PRINCIPAL -->
<div class="main-content">
  <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap">
    <h5 class="mb-0">Dashboard</h5>
    <div class="d-flex align-items-center gap-2">
      <i class="fas fa-user-circle fa-lg"></i>
      <span id="nombre-usuario">Invitado</span>
      <button id="cerrar-sesion" class="btn btn-sm btn-danger">Cerrar sesión</button>
    </div>
  </div>

  <div id="dashboardContent">
    <div class="row">
      <div class="col-md-4">
        <div class="card-box p-3 shadow rounded d-flex align-items-center">
          <i class="fas fa-users fa-2x text-primary me-3"></i>
          <div>
            <h6 class="mb-0">Usuarios</h6>
            <strong>25 activos</strong>
          </div>
        </div>
      </div>
    </div>
  </div>

  <iframe id="iframe"></iframe>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const nombre = localStorage.getItem('usuario') || 'Invitado';
  document.getElementById('nombre-usuario').textContent = nombre;

  document.getElementById("cerrar-sesion").addEventListener("click", () => {
    localStorage.clear();
    window.location.href = "Login.html";
  });

  function cargarIframe(rutaHtml, botonId) {
    document.querySelectorAll('#menuPc .nav-link, #navbarMobile .nav-link').forEach(el => el.classList.remove('active'));
    document.getElementById(botonId)?.classList.add('active');
    document.getElementById('dashboardContent').style.display = 'none';
    const iframe = document.getElementById('iframe');
    iframe.src = rutaHtml;
    iframe.style.display = 'block';
    iframe.onload = () => iframe.contentWindow.postMessage({ nombreUsuario: nombre }, '*');
  }

  function asignarEventos(btnIds, htmls) {
    btnIds.forEach((id, i) => {
      document.getElementById(id)?.addEventListener('click', () => cargarIframe(htmls[i], id));
    });
  }

  const botones = ['btnReclamosPc','btnGestionarPc','btnListaPrePedidoPc','btnPrePedidoPc','btnDashboardPc','btnReclamosMb','btnGestionarMb','btnListaPrePedidoMb','btnPrePedidoMb','btnDashboardMb'];
  const rutas = ['BusquedaReclamaciones.html','Gestionar.html','BusquedaPrePedido.html','calzados.html','#','BusquedaReclamaciones.html','Gestionar.html','BusquedaPrePedido.html','calzados.html','#'];

  asignarEventos(botones, rutas);

  botones.filter(btn => btn.includes('Dashboard')).forEach(id => {
    document.getElementById(id)?.addEventListener('click', () => {
      document.querySelectorAll('#menuPc .nav-link, #navbarMobile .nav-link').forEach(el => el.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      document.getElementById('dashboardContent').style.display = 'block';
      document.getElementById('iframe').style.display = 'none';
    });
  });

  // Mostrar/Ocultar botones según rol
  const rol = localStorage.getItem('rol');
  const roles = {
    'ADMINISTRADOR': botones,
    'GESTOR DE PRODUCTO': ['btnGestionarPc','btnGestionarMb'],
    'VENDEDOR': ['btnPrePedidoPc','btnListaPrePedidoPc','btnPrePedidoMb','btnListaPrePedidoMb']
  };
  botones.forEach(id => document.getElementById(id)?.closest('li')?.classList.add('d-none'));

  (roles[rol] || []).forEach(id => document.getElementById(id)?.closest('li')?.classList.remove('d-none'));
  
  // Cierra el navbar móvil al hacer clic en cualquier enlace del navbar
  document.querySelectorAll('.navbar-collapse .nav-link').forEach(link => {
    link.addEventListener('click', () => {
      const navbarCollapse = document.querySelector('.navbar-collapse');
      const bsCollapse = bootstrap.Collapse.getInstance(navbarCollapse);
      if (bsCollapse) {
        bsCollapse.hide();
      }
    });
  });
</script>
</body>
</html>
