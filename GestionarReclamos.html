<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Gestión</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body {
      background-color: #fdfaf8;
      font-family: 'Segoe UI', sans-serif;
    }

    .boton-flotante {
      width: 240px;
      height: 140px;
      border-radius: 16px;
      background: #ffffff;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: all 0.25s ease;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 1px solid #eee;
    }

    .boton-flotante:hover {
      transform: translateY(-4px);
      box-shadow: 0 6px 16px rgba(0,0,0,0.12);
    }

    .boton-flotante i {
      font-size: 36px;
      margin-bottom: 10px;
      color: #fd7e14; /* naranja moderno */
    }

    .contenedor-botones {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 40px;
      margin-top: 60px;
    }

    @media (max-width: 576px) {
      .boton-flotante {
        width: 90%;
        height: auto;
        padding: 20px 0;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="contenedor-botones">
      
      <div class="boton-flotante" onclick="location.href='BusquedaReclamaciones.html'">
        <i class="bi bi-cart-check-fill"></i>
        <span class="fw-semibold">Ecomerce</span>
      </div>
      
      <div class="boton-flotante" onclick="location.href='GestionarReclamosTienda.html'">
        <i class="bi bi-shop-window"></i>
        <span class="fw-semibold">Tienda</span>
      </div>

    </div>
  </div>
</body>
</html>
